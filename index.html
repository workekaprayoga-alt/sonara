      else if (i === 1) rank.classList.add('text-gray-300');
      else if (i === 2) rank.classList.add('text-orange-400');
      else rank.classList.add('text-white/50');
      row.appendChild(rank);
      // Cover
      const cov = el('div', 'w-10 h-10 rounded bg-spo-elevated flex-shrink-0');
      const cu = coverUrl(item.track);
      if (cu) cov.style.backgroundImage = `url(${cu})`, cov.style.backgroundSize = 'cover';
      row.appendChild(cov);
      // Info
      const info = el('div', 'flex-1 min-w-0');
      info.appendChild(el('div', 'text-sm font-semibold truncate', item.track.title));
      info.appendChild(el('div', 'text-xs text-white/60 truncate', item.track.artist));
      row.appendChild(info);
      // Count
      const cnt = el('div', 'flex-shrink-0 text-right');
      cnt.innerHTML = `<div class="text-sm font-bold tabular-nums">${item.playCount}×</div><div class="text-[10px] text-white/50">${formatDuration(item.totalDuration)}</div>`;
      row.appendChild(cnt);
      row.onclick = () => {
        const idx = state.tracks.findIndex(x => x.id === item.track.id);
        playFromList(state.tracks, idx, { type: 'library', name: 'Top stats' });
      };
      list.appendChild(row);
    });
    card.appendChild(list);
  }

  // === Top Artists ===
  const topArtists = getTopArtistsInPeriod(history, _statsPeriod, 5);
  if (topArtists.length > 0) {
    card.appendChild(el('h3', 'text-sm font-bold uppercase tracking-wider text-white/80 mb-3', 'Top Artis'));
    const list = el('div', 'flex flex-col gap-1 mb-5');
    topArtists.forEach((a, i) => {
      const row = el('div', 'flex items-center gap-3 py-1.5');
      const rank = el('div', 'w-6 text-center font-bold text-sm text-white/60 flex-shrink-0');
      rank.textContent = `${i+1}`;
      row.appendChild(rank);
      row.appendChild(el('div', 'flex-1 font-semibold text-sm truncate', a.name));
      const c = el('div', 'text-xs text-white/60 tabular-nums flex-shrink-0');
      c.textContent = `${a.playCount}×`;
      row.appendChild(c);
      list.appendChild(row);
    });
    card.appendChild(list);
  }

  // === Daily activity (last 14 days) — bar chart ===
  // Hanya tampilkan kalau periode > today
  if (_statsPeriod !== 'today' && _statsPeriod !== 'all') {
    const days = _statsPeriod === 'week' ? 7 : 30;
    const histogram = getDailyHistogram(history, days);
    const max = Math.max(...histogram.map(d => d.seconds), 1);
    card.appendChild(el('h3', 'text-sm font-bold uppercase tracking-wider text-white/80 mb-3', 'Aktivitas Harian'));
    const chart = el('div', 'flex items-end gap-1 h-20 mb-2');
    histogram.forEach(d => {
      const h = max > 0 ? Math.max(2, Math.round((d.seconds / max) * 80)) : 2;
      const bar = el('div', 'flex-1 bg-spo-green rounded-t transition-all');
      bar.style.height = h + 'px';
      bar.style.opacity = d.seconds > 0 ? '1' : '0.2';
      bar.title = `${d.date.toLocaleDateString('id-ID', { weekday: 'short', day: 'numeric', month: 'short' })}: ${formatDuration(d.seconds)}`;
      chart.appendChild(bar);
    });
    card.appendChild(chart);
    // Label
    const label = el('div', 'flex justify-between text-[10px] text-white/50');
    label.innerHTML = `<span>${days} hari yang lalu</span><span>Hari ini</span>`;
    card.appendChild(label);
  }

  // === Insight cards (kalau ada data cukup) ===
  if (_statsPeriod === 'week' || _statsPeriod === 'month') {
    const allHistory = history;
    const insights = [];

    // Hari paling intens
    const hist = getDailyHistogram(allHistory, _statsPeriod === 'week' ? 7 : 30);
    const peakDay = hist.reduce((max, d) => d.seconds > max.seconds ? d : max, { seconds: 0 });
    if (peakDay.seconds > 60) {
      insights.push({
        emoji: '🏆',
        title: 'Hari paling intens',
        body: `${peakDay.date.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long' })} — ${formatDuration(peakDay.seconds)}`
      });
    }

    // Jam favorit
    const hourly = getHourlyPattern(filtered);
    const peakHour = hourly.indexOf(Math.max(...hourly));
    if (hourly[peakHour] > 0) {
      const label = peakHour < 5 ? 'dini hari' : peakHour < 11 ? 'pagi' : peakHour < 15 ? 'siang' : peakHour < 19 ? 'sore' : 'malam';
      insights.push({
        emoji: '🕐',
        title: 'Jam favorit dengar',
        body: `Pukul ${peakHour.toString().padStart(2, '0')}:00 (${label})`
      });
    }

    // Hari favorit
    const dow = getDayOfWeekPattern(filtered);
    const peakDow = dow.indexOf(Math.max(...dow));
    if (dow[peakDow] > 0) {
      const dayNames = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
      insights.push({
        emoji: '📅',
        title: 'Hari paling musik',
        body: `${dayNames[peakDow]}`
      });
    }

    if (insights.length > 0) {
      card.appendChild(el('h3', 'text-sm font-bold uppercase tracking-wider text-white/80 mb-3 mt-2', 'Wawasan'));
      const insightGrid = el('div', 'flex flex-col gap-2');
      insights.forEach(ins => {
        const ic = el('div', 'bg-black/30 rounded-lg p-3 flex items-center gap-3');
        ic.innerHTML = `
          <div class="text-2xl flex-shrink-0">${ins.emoji}</div>
          <div class="flex-1 min-w-0">
            <div class="text-xs text-white/60">${ins.title}</div>
            <div class="font-semibold text-sm">${escapeHtml(ins.body)}</div>
          </div>
        `;
        insightGrid.appendChild(ic);
      });
      card.appendChild(insightGrid);
    }
  }

  container.appendChild(card);
}

// ----- Search -----
// Local query: nggak masuk state, jadi ketik nggak trigger render → keyboard nggak tutup
let _searchQuery = '';
function renderSearchView() {
  const wrap = el('div', 'p-4 pb-32');
  wrap.appendChild(el('h1', 'text-2xl font-bold mb-4', 'Cari'));

  const search = el('input', 'w-full bg-spo-elevated text-white px-4 py-3 rounded-md outline-none placeholder-spo-textMuted');
  search.type = 'search';
  search.placeholder = 'Cari lagu, artis, atau album';
  search.value = _searchQuery;
  // Auto-focus saat pertama buka view, supaya user bisa langsung ketik
  setTimeout(() => { try { if (document.activeElement !== search) {/* don't steal focus if user already focused elsewhere */} } catch(e){} }, 50);
  wrap.appendChild(search);

  // Container hasil — kita patch DOM-nya, BUKAN re-render whole view
  const resultsBox = el('div', '');
  wrap.appendChild(resultsBox);

  function renderResults() {
    resultsBox.innerHTML = '';
    if (!_searchQuery) {
      // Browse: artists & albums
      const artists = [...new Set(state.tracks.map(t => t.artist).filter(a => a && a !== 'Unknown Artist'))];
      const albums = [...new Set(state.tracks.map(t => t.album).filter(a => a && a !== 'Unknown Album'))];

      if (artists.length > 0) {
        resultsBox.appendChild(el('h2', 'text-lg font-bold mt-6 mb-3', 'Artis'));
        const grid = el('div', 'grid grid-cols-2 gap-3');
        artists.slice(0, 10).forEach(a => grid.appendChild(renderArtistCard(a)));
        resultsBox.appendChild(grid);
      }
      if (albums.length > 0) {
        resultsBox.appendChild(el('h2', 'text-lg font-bold mt-6 mb-3', 'Album'));
        const grid = el('div', 'grid grid-cols-2 gap-3');
        albums.slice(0, 10).forEach(a => grid.appendChild(renderAlbumCard(a)));
        resultsBox.appendChild(grid);
      }
      return;
    }
    const q = _searchQuery.toLowerCase();
    const matched = state.tracks.filter(t =>
      t.title.toLowerCase().includes(q) ||
      t.artist.toLowerCase().includes(q) ||
      t.album.toLowerCase().includes(q)
    );
    if (matched.length === 0) {
      resultsBox.appendChild(el('div', 'text-center text-spo-textMuted mt-12', 'Tidak ada hasil'));
      return;
    }
    resultsBox.appendChild(el('h2', 'text-lg font-bold mt-6 mb-3', `${matched.length} lagu`));
    const list = el('div', 'flex flex-col');
    matched.forEach((t, i) => list.appendChild(renderTrackRow(t, i, matched, { type: 'library', name: 'Hasil pencarian' })));
    resultsBox.appendChild(list);
  }

  // Debounce kecil supaya pengetikan cepat nggak ngeri-rebuild list per huruf
  let searchDebounce = null;
  search.oninput = (e) => {
    _searchQuery = e.target.value;
    clearTimeout(searchDebounce);
    searchDebounce = setTimeout(() => {
      // Render hasil tanpa setState — input tetap focused, keyboard tetap kebuka
      renderResults();
    }, 120);
  };

  // Initial render hasil
  renderResults();
  return wrap;
}

  shuffleBtn.onclick = () => {
    if (tracks.length === 0) return;
    if (!state.shuffle) toggleShuffle();
    playFromList(tracks, 0, { type: 'playlist', name: pl.name, id: pl.id });
  };
  actions.appendChild(shuffleBtn);

  const playBtn = el('button', 'w-14 h-14 bg-spo-green hover:bg-spo-greenHover hover:scale-105 transition rounded-full flex items-center justify-center text-black');

    playFromList(tracks, 0, { type: 'playlist', name: pl.name, id: pl.id });
  };
  actions.appendChild(playBtn);
  wrap.appendChild(actions);

  // Edit chip row (Tambahkan / Edit / Urutkan / Nama)
  const chips = el('div', 'flex gap-2 px-4 mb-4 overflow-x-auto scroll-y');
  const tambah = el('button', 'flex items-center gap-1.5 px-3.5 py-1.5 rounded-full bg-spo-elevated text-sm font-semibold whitespace-nowrap');
  tambah.innerHTML = svgIcon('plus', 16) + '<span>Tambahkan</span>';
  tambah.onclick = () => {
    // Tampilkan dialog pilih lagu
    const dialog = renderAddTrackToPlaylistDialog(pl);
    document.body.appendChild(dialog);

  edit.innerHTML = svgIcon('edit', 16) + '<span>Edit</span>';
  edit.onclick = () => { editMode = !editMode; render(); };
  chips.appendChild(edit);

  const sort = el('button', 'flex items-center gap-1.5 px-3.5 py-1.5 rounded-full bg-spo-elevated text-sm font-semibold whitespace-nowrap');
  sort.innerHTML = svgIcon('sort', 16) + '<span>Urutkan</span>';
  sort.onclick = () => {
    // Cycle: addedAt / title / artist
    const orders = ['default', 'title', 'artist'];
    const cur = pl._sort || 'default';
    const next = orders[(orders.indexOf(cur) + 1) % orders.length];
    pl._sort = next;
    if (next === 'title') pl.trackIds.sort((a, b) => {
      const ta = state.tracks.find(t => t.id === a)?.title || '';
      const tb = state.tracks.find(t => t.id === b)?.title || '';
      return ta.localeCompare(tb);
    });
    else if (next === 'artist') pl.trackIds.sort((a, b) => {
      const ta = state.tracks.find(t => t.id === a)?.artist || '';
      const tb = state.tracks.find(t => t.id === b)?.artist || '';
      return ta.localeCompare(tb);
    });
    dbPut(STORE_PLAYLISTS, pl).then(() => render());
  };
  chips.appendChild(sort);

  const ren = el('button', 'flex items-center gap-1.5 px-3.5 py-1.5 rounded-full bg-spo-elevated text-sm font-semibold whitespace-nowrap');
  ren.innerHTML = svgIcon('pencil', 16) + '<span>Nama & deskripsi</span>';
  ren.onclick = async () => {
    const name = prompt('Nama playlist:', pl.name);
    if (name && name.trim()) {
      pl.name = name.trim();
      await dbPut(STORE_PLAYLISTS, pl);
      render();
    }
  };
  chips.appendChild(ren);
  wrap.appendChild(chips);

  // Tracks list (with optional drag-reorder)
  const list = el('div', 'flex flex-col px-2');
  if (tracks.length === 0) {
    list.appendChild(el('div', 'text-center text-spo-textMuted py-8', 'Playlist masih kosong'));
  } else {
    tracks.forEach((t, i) => {
      const row = renderTrackRow(t, i, tracks, { type: 'playlist', name: pl.name, id: pl.id }, {
        showDragHandle: editMode,
        onDragReorder: (from, to) => reorderPlaylist(pl.id, from, to),
        playlistId: pl.id,
      });
      list.appendChild(row);
    });
  }
  wrap.appendChild(list);

  return wrap;
}

async function pickOverrideImage(key) {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.onchange = async (e) => {
    const f = e.target.files[0];
    if (f) await setOverrideImage(key, f);
  };
  input.click();
}

// ----- Track Row -----
function renderTrackRow(t, i, list, context, opts = {}) {
  const isPlaying = state.currentTrack?.id === t.id;
  const row = el('div', 'flex items-center gap-3 py-2 px-2 hover:bg-white/5 transition cursor-pointer rounded relative');
  if (opts.showDragHandle) row.dataset.idx = String(i);

  const cov = el('div', 'w-12 h-12 bg-spo-elevated rounded flex-shrink-0 relative overflow-hidden');
  const cu = coverUrl(t);
  if (cu) cov.style.backgroundImage = `url(${cu})`, cov.style.backgroundSize = 'cover', cov.style.backgroundPosition = 'center';
  if (isPlaying) {
    const overlay = el('div', 'absolute inset-0 bg-black/40 flex items-center justify-center');
    overlay.innerHTML = `<div class="eq-bars"><span></span><span></span><span></span></div>`;
    cov.appendChild(overlay);
  }
  row.appendChild(cov);

  const meta = el('div', 'flex-1 min-w-0');
  const title = el('div', 'font-semibold truncate ' + (isPlaying ? 'text-spo-green' : ''), t.title);
  meta.appendChild(title);
  meta.appendChild(el('div', 'text-sm text-spo-textMuted truncate', t.artist));
  row.appendChild(meta);

  if (opts.showDragHandle) {
    const handle = el('div', 'drag-handle p-2 text-white/60');
    handle.innerHTML = svgIcon('handle', 18);
    handle.draggable = true;
    let fromIdx = i;
    handle.addEventListener('dragstart', (e) => {
      fromIdx = i;
      row.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', String(i));
    });
    row.addEventListener('dragover', (e) => { e.preventDefault(); row.classList.add('drag-over'); });
    row.addEventListener('dragleave', () => row.classList.remove('drag-over'));
    row.addEventListener('drop', (e) => {
      e.preventDefault();
      const from = parseInt(e.dataTransfer.getData('text/plain'), 10);
      const to = i;
      row.classList.remove('drag-over');
      if (from !== to && opts.onDragReorder) opts.onDragReorder(from, to);
    });
    row.addEventListener('dragend', () => row.classList.remove('dragging'));

    // Touch support: long-press to start drag (basic)
    let touchStartY = 0;
    let touchOrigin = null;
    handle.addEventListener('touchstart', (e) => {
      touchOrigin = i;
      touchStartY = e.touches[0].clientY;
      row.classList.add('dragging');
    });
    handle.addEventListener('touchmove', (e) => {
      e.preventDefault();
      const y = e.touches[0].clientY;
      const target = document.elementFromPoint(e.touches[0].clientX, y);
      const targetRow = target?.closest('[data-idx]');
      document.querySelectorAll('[data-idx]').forEach(r => r.classList.remove('drag-over'));
      if (targetRow) targetRow.classList.add('drag-over');
    }, { passive: false });
    handle.addEventListener('touchend', (e) => {
      const t2 = e.changedTouches[0];
      const target = document.elementFromPoint(t2.clientX, t2.clientY);
      const targetRow = target?.closest('[data-idx]');
      row.classList.remove('dragging');
      document.querySelectorAll('[data-idx]').forEach(r => r.classList.remove('drag-over'));
      if (targetRow) {
        const to = parseInt(targetRow.dataset.idx, 10);
        if (touchOrigin !== to && opts.onDragReorder) opts.onDragReorder(touchOrigin, to);
      }
    });
    row.appendChild(handle);
  } else {
    const more = el('button', 'p-2 text-white/60 flex-shrink-0');
    more.innerHTML = svgIcon('more', 18);
    more.onclick = (e) => {
      e.stopPropagation();
      setState({ contextMenuTrack: { ...t, _ctx: context } });
    };
    row.appendChild(more);
  }

  row.onclick = () => playFromList(list, i, context);
  return row;
}

// ----- Mini Player -----
function renderMiniPlayer() {
  const t = state.currentTrack;
  // FIX: pakai div, bukan button (cegah nested button HTML invalid yang bikin tap aneh)
  const wrap = el('div', 'w-full bg-spo-sheet mx-2 mb-1 rounded-md flex items-center gap-3 p-2 transition cursor-pointer select-none');
  wrap.style.width = 'calc(100% - 16px)';
  wrap.setAttribute('role', 'button');
  wrap.setAttribute('tabindex', '0');

  const cov = el('div', 'w-10 h-10 bg-spo-elevated rounded flex-shrink-0');
  const cu = coverUrl(t);
  if (cu) { cov.style.backgroundImage = `url(${cu})`; cov.style.backgroundSize = 'cover'; cov.style.backgroundPosition = 'center'; }
  wrap.appendChild(cov);

  const info = el('div', 'flex-1 min-w-0 text-left pointer-events-none');
  info.appendChild(el('div', 'text-sm font-semibold truncate', t.title));
  info.appendChild(el('div', 'text-xs text-spo-textMuted truncate', t.artist));
  wrap.appendChild(info);

  // Like — pakai stopPropagation + pointerdown supaya nggak bubble ke wrap
  const likeBtn = el('button', 'p-2 ' + (t.liked ? 'text-spo-green' : 'text-white/80'));
  likeBtn.innerHTML = svgIcon(t.liked ? 'heart-filled' : 'heart', 22);
  likeBtn.addEventListener('pointerdown', (e) => e.stopPropagation());
  likeBtn.onclick = (e) => { e.stopPropagation(); e.preventDefault(); toggleLike(t.id); };
  wrap.appendChild(likeBtn);

  // Play/pause
  const pp = el('button', 'p-2 text-white');
  pp.innerHTML = svgIcon(state.isPlaying ? 'pause' : 'play', 22);
  pp.addEventListener('pointerdown', (e) => e.stopPropagation());
  pp.onclick = (e) => { e.stopPropagation(); e.preventDefault(); togglePlay(); };
  wrap.appendChild(pp);

  // Progress bar (tipis di bawah) — update via DOM listener, bukan re-render
  const outer = el('div', 'relative');
  outer.appendChild(wrap);
  const bar = el('div', 'h-0.5 bg-white/30 mx-3 rounded-full overflow-hidden pointer-events-none');
  const fill = el('div', 'h-full bg-white');
  fill.style.width = `${(audio.currentTime / audio.duration) * 100 || 0}%`;
  bar.appendChild(fill);
  outer.appendChild(bar);

  // Subscribe ke time updates → patch DOM langsung (tidak trigger render apa-apa)
  const unsub = onTimeUpdate((cur, dur) => {
    if (!fill.isConnected) { unsub(); return; }
    const p = (cur / (dur || 1)) * 100 || 0;
    fill.style.width = p + '%';
  });

  // Open full player — debounce untuk cegah double-trigger
  let opening = false;
  const openFullPlayer = (e) => {
    if (opening) return;
    opening = true;
    // Pakai pointerdown-end + click bisa dobel; kita pakai click only.
    setState({ fullPlayerOpen: true });
    setTimeout(() => { opening = false; }, 500);
  };
  wrap.onclick = openFullPlayer;

  return outer;
}

// ----- Full Player -----
// Track kapan full player pertama kali dibuka. Saat re-render terjadi (misal karena
// sheet di atasnya ditutup), kita TIDAK animasi slide-up lagi — animasi cuma untuk
// transisi pertama kali muncul, bukan tiap re-render.
let _fullPlayerOpenedAt = 0;
let _wasFullPlayerOpen = false;

function renderFullPlayer() {
  const t = state.currentTrack;
  if (!t) return el('div');
  // Deteksi transisi: kalau sebelumnya ditutup, sekarang dibuka → mark timestamp
  if (!_wasFullPlayerOpen) {
    _fullPlayerOpenedAt = Date.now();
  }
  _wasFullPlayerOpen = true;
  // Animasi cuma di first render dalam window 500ms — re-render setelahnya: skip
  const sinceOpen = Date.now() - _fullPlayerOpenedAt;
  const shouldAnimate = sinceOpen < 500;
  const animClass = shouldAnimate ? 'animate-slide-up' : '';
  const overlay = el('div', `fixed inset-0 z-40 ${animClass} overflow-hidden bg-spo-bg`);
  // Helper close-with-animation untuk full player
  const closeFull = () => closeSheetWithAnim(overlay, overlay, () => setState({ fullPlayerOpen: false }), true);
  // Stop tap dari nembus ke layer di belakang
  overlay.addEventListener('pointerdown', (e) => e.stopPropagation());
  // ===== BACKGROUND LAYER =====
  // Cover dengan Ken Burns animation (slow zoom-pan)
  const bg = el('div', 'absolute inset-0 overflow-hidden');
  bg.style.background = '#0a0a0a';
  const cu = coverUrl(t);

  if (cu) {
    // === Cover dengan Ken Burns animation (default untuk semua lagu) ===
    // Layer 1: cover utama dengan slow zoom-pan
    const coverImg = el('div', 'absolute inset-0 ken-burns');
    coverImg.style.backgroundImage = `url(${cu})`;
    coverImg.style.backgroundSize = 'cover';
    coverImg.style.backgroundPosition = 'center';
    coverImg.style.filter = 'blur(40px) brightness(0.7)';
    coverImg.style.transform = 'scale(1.3)'; // start scale untuk hide blur edge
    if (!state.isPlaying) coverImg.style.animationPlayState = 'paused';
    bg.appendChild(coverImg);

    // Layer 2: cover lebih sharp di belakang, opacity rendah, gerakan beda direction
    const coverImg2 = el('div', 'absolute inset-0 ken-burns-reverse');
    coverImg2.style.backgroundImage = `url(${cu})`;
    coverImg2.style.backgroundSize = 'cover';
    coverImg2.style.backgroundPosition = 'center';
    coverImg2.style.filter = 'blur(60px) brightness(0.5)';
    coverImg2.style.opacity = '0.7';
    coverImg2.style.transform = 'scale(1.4)';
    if (!state.isPlaying) coverImg2.style.animationPlayState = 'paused';
    bg.appendChild(coverImg2);

    // Sync animation play state dengan isPlaying
    const unsubKB = subscribe(() => {
      if (!coverImg.isConnected) { unsubKB(); return; }
      const playState = state.isPlaying ? 'running' : 'paused';
      coverImg.style.animationPlayState = playState;
      coverImg2.style.animationPlayState = playState;
    });

    // === Color theme adaptif (di atas Ken Burns layers) ===
    const colorLayer = el('div', 'absolute inset-0 transition-opacity duration-700 pointer-events-none');
    colorLayer.style.opacity = '0';
    bg.appendChild(colorLayer);
    extractDominantColors(t).then(colors => {
      if (!colors || !colorLayer.isConnected) return;
      colorLayer.style.background = `linear-gradient(180deg, ${rgbStr(colors.primary)} 0%, ${rgbStr(colors.secondary)} 60%, #000 100%)`;
      colorLayer.style.opacity = '0.45';
    });
  }

  // Dark gradient overlay di paling atas — bikin teks tetap terbaca
  const grad = el('div', 'absolute inset-0 pointer-events-none');
  grad.style.background = 'linear-gradient(180deg, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.25) 40%, rgba(0,0,0,0.55) 80%, rgba(0,0,0,0.85) 100%)';
  bg.appendChild(grad);

  // (Kompatibilitas: variabel lama yang dipakai di bawah)
  // (old block dihapus — replaced with new canvas/Ken Burns block above)
  overlay.appendChild(bg);

  // Content
  const content = el('div', 'relative h-full flex flex-col safe-top safe-bottom z-10');

  // Top bar
  const top = el('div', 'flex items-center px-3 py-3');
  const down = el('button', 'p-2');
  down.innerHTML = svgIcon('chevron-down', 24);
  down.onclick = closeFull;
  top.appendChild(down);
  const titleC = el('div', 'flex-1 text-center');
  titleC.appendChild(el('div', 'text-[10px] tracking-wider text-white/70 uppercase', state.queueContext ? `Memainkan dari ${labelContextType(state.queueContext.type)}` : 'Memainkan'));
  titleC.appendChild(el('div', 'text-sm font-bold', state.queueContext?.name || ''));
  top.appendChild(titleC);
  const more = el('button', 'p-2');
  more.innerHTML = svgIcon('more', 22);
  more.onclick = () => setState({ contextMenuTrack: t });
  top.appendChild(more);
  content.appendChild(top);

  // Spacer di tengah (cover dari blurred bg di belakang, tidak ada panel di sini)
  const middle = el('div', 'flex-1 relative');
  content.appendChild(middle);

  // Tombol LIRIK di top bar (kanan, sebelum tombol more) — buka halaman lirik terpisah
  if (t.lyrics || t.lyricsSynced) {
    const lyricBtn = el('button', 'mr-1 px-3 py-1 rounded-full bg-white/15 text-xs font-semibold hover:bg-white/25 active:scale-95 transition');
    lyricBtn.textContent = 'LIRIK';
    lyricBtn.onclick = () => setState({ lyricsPageOpen: true });
    top.insertBefore(lyricBtn, more);
  }

  // Lirik preview (kalau ada — kita skip untuk sekarang, tampilkan info)
  // Track info row
  const info = el('div', 'px-6 mb-3 flex items-end justify-between gap-3');
  const tinfo = el('div', 'flex-1 min-w-0');
  tinfo.appendChild(el('div', 'text-2xl font-bold truncate', t.title));
  const artistBtn = el('button', 'text-white/70 text-base text-left truncate w-full');
  artistBtn.textContent = t.artist;
  artistBtn.onclick = () => {
    closeSheetWithAnim(overlay, overlay, () => setState({ view: 'artist', viewParam: t.artist, fullPlayerOpen: false }), true);
  };
  tinfo.appendChild(artistBtn);
  info.appendChild(tinfo);

  const likeBtn = el('button', 'p-2 ' + (t.liked ? 'text-spo-green' : 'text-white/80'));
  likeBtn.innerHTML = svgIcon(t.liked ? 'check-circle-filled' : 'plus-circle', 28);
  likeBtn.onclick = () => toggleLike(t.id);
  info.appendChild(likeBtn);
  content.appendChild(info);

  // Progress bar — update via DOM listener (bukan re-render) supaya nggak loncat
  const seekRow = el('div', 'px-6');
  const seek = el('input', 'seek');
  seek.type = 'range'; seek.min = 0; seek.max = audio.duration || 0; seek.step = 0.1; seek.value = audio.currentTime || 0;
  // Style fill awal
  const initPct = (audio.currentTime / (audio.duration || 1)) * 100 || 0;
  seek.style.background = `linear-gradient(to right, #fff 0%, #fff ${initPct}%, rgba(255,255,255,0.3) ${initPct}%, rgba(255,255,255,0.3) 100%)`;

  // Saat user pegang slider, jangan auto-update value-nya dari timeupdate (biar nggak "loncat" balik)
  let seeking = false;
  seek.addEventListener('pointerdown', () => { seeking = true; });
  seek.addEventListener('pointerup', () => { seeking = false; });
  seek.addEventListener('touchstart', () => { seeking = true; }, { passive: true });
  seek.addEventListener('touchend', () => { seeking = false; });
  seek.oninput = (e) => audio.currentTime = parseFloat(e.target.value);
  seekRow.appendChild(seek);

  const times = el('div', 'flex justify-between text-xs text-white/70 mt-1');
  const tCur = el('span', '', fmt(audio.currentTime || 0));
  const tDur = el('span', '', fmt(audio.duration || 0));
  times.appendChild(tCur);
  times.appendChild(tDur);
  seekRow.appendChild(times);
  content.appendChild(seekRow);

  // DOM-only updates via time emitter
  const unsubTime = onTimeUpdate((cur, dur) => {
    if (!seek.isConnected) { unsubTime(); return; }
    if (!seeking) {
      seek.max = dur || 0;
      seek.value = cur || 0;
      const p = (cur / (dur || 1)) * 100 || 0;
      seek.style.background = `linear-gradient(to right, #fff 0%, #fff ${p}%, rgba(255,255,255,0.3) ${p}%, rgba(255,255,255,0.3) 100%)`;
      tCur.textContent = fmt(cur || 0);
    }
    tDur.textContent = fmt(dur || 0);
  });

  // Controls (shuffle, prev, PLAY, next, sleep timer)
  const ctl = el('div', 'flex items-center justify-between px-6 mt-4');
  const shB = el('button', `p-2 ${state.shuffle ? 'text-spo-green' : 'text-white/80'}`);
  shB.innerHTML = svgIcon('shuffle', 24);
  shB.onclick = toggleShuffle;
  ctl.appendChild(shB);
  const prv = el('button', 'p-2 text-white');
  prv.innerHTML = svgIcon('prev', 28);
  prv.onclick = prevTrack;
  ctl.appendChild(prv);
  const pp = el('button', 'w-16 h-16 bg-white text-black rounded-full flex items-center justify-center hover:scale-105 transition');
  pp.innerHTML = svgIcon(state.isPlaying ? 'pause' : 'play', 30);
  pp.onclick = togglePlay;
  ctl.appendChild(pp);
  const nxt = el('button', 'p-2 text-white');
  nxt.innerHTML = svgIcon('next', 28);
  nxt.onclick = nextTrack;
  ctl.appendChild(nxt);
  const sleep = el('button', `p-2 ${state.sleepTimerEndsAt || state.sleepTimerEndOfTrack ? 'text-spo-green' : 'text-white/80'}`);
  sleep.innerHTML = svgIcon('timer', 24);
  sleep.onclick = () => setState({ sleepTimerSheetOpen: true });
  ctl.appendChild(sleep);
  content.appendChild(ctl);

  // Sleep timer countdown
  if (state.sleepTimerEndsAt) {
    const remaining = Math.max(0, state.sleepTimerEndsAt - Date.now());
    const m = Math.floor(remaining / 60000);
    const s = Math.floor((remaining % 60000) / 1000);
    content.appendChild(el('div', 'text-center text-xs text-spo-green mt-2', `Akan berhenti dalam ${m}:${s.toString().padStart(2, '0')}`));
  } else if (state.sleepTimerEndOfTrack) {
    content.appendChild(el('div', 'text-center text-xs text-spo-green mt-2', 'Akan berhenti di akhir lagu'));
  }

  // Bottom row: queue button (rata kanan)
  const bottom = el('div', 'flex items-center justify-end px-6 mt-6 mb-4');
  const queueBtn = el('button', 'p-2 text-white/70 hover:text-white active:scale-95 transition');
  queueBtn.innerHTML = svgIcon('queue', 22);
  queueBtn.onclick = () => setState({ queueSheetOpen: true });
  bottom.appendChild(queueBtn);
  content.appendChild(bottom);

  overlay.appendChild(content);
  return overlay;
}

// ===== Lyrics Page =====
// Halaman lirik full-screen terpisah, dipanggil saat user tap LIRIK di full player.
// Synced lyrics: highlight + auto-center baris aktif (transform-based, smooth).
// Plain lyrics: scroll biasa.
function renderLyricsPage() {
  const t = state.currentTrack;
  if (!t) return el('div');

  const overlay = el('div', 'fixed inset-0 z-[45] flex flex-col safe-top safe-bottom animate-slide-up');
  // Background: gradient warna dari cover blur (tetep konsisten dengan full player vibe)
  overlay.style.background = '#0a0a0a';
  const cu = coverUrl(t);
  if (cu) {
    const bg = el('div', 'absolute inset-0 -z-10');
    bg.style.backgroundImage = `url(${cu})`;
    bg.style.backgroundSize = 'cover';
    bg.style.backgroundPosition = 'center';
    bg.style.filter = 'blur(60px) brightness(0.4)';
    bg.style.transform = 'scale(1.2)';
    overlay.appendChild(bg);
    const grad = el('div', 'absolute inset-0 -z-10');
    grad.style.background = 'linear-gradient(180deg, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.85) 100%)';
    overlay.appendChild(grad);
  }

  const doClose = () => closeSheetWithAnim(overlay, overlay, () => setState({ lyricsPageOpen: false }), true);

  // Top bar: chevron-down (close) + cover kecil + judul/artis + ⋯
  const top = el('div', 'flex items-center px-3 py-3 gap-3 z-10');
  const down = el('button', 'p-2 hover:bg-white/10 rounded-full active:scale-95 transition');
  down.innerHTML = svgIcon('chevron-down', 22);
  down.onclick = doClose;
  top.appendChild(down);

  const miniCov = el('div', 'w-9 h-9 bg-spo-elevated rounded flex-shrink-0');
  if (cu) miniCov.style.backgroundImage = `url(${cu})`, miniCov.style.backgroundSize = 'cover';
  top.appendChild(miniCov);

  const tInfo = el('div', 'flex-1 min-w-0');
  tInfo.appendChild(el('div', 'font-bold text-sm truncate', t.title));
  tInfo.appendChild(el('div', 'text-xs text-white/60 truncate', t.artist));
  top.appendChild(tInfo);

  const moreBtn = el('button', 'p-2 hover:bg-white/10 rounded-full active:scale-95 transition');
  moreBtn.innerHTML = svgIcon('more', 22);
  moreBtn.onclick = () => setState({ contextMenuTrack: t });
  top.appendChild(moreBtn);
  overlay.appendChild(top);

  // Body — lirik
  if (t.lyricsSynced && t.lyricsSynced.length > 0) {
    // === Synced lyrics: container overflow-hidden + inner translateY ===
    const body = el('div', 'flex-1 relative overflow-hidden z-10');
    const inner = el('div', 'absolute left-0 right-0 px-6 will-change-transform');
    inner.style.top = '50%';
    inner.style.transform = 'translateY(0)';
    inner.style.transition = 'transform 800ms cubic-bezier(0.22, 1, 0.36, 1)';
    body.appendChild(inner);

    t.lyricsSynced.forEach((ln, idx) => {
      const lineEl = el('div', 'lyr-line py-3 text-2xl font-bold leading-snug cursor-pointer');
      lineEl.dataset.lyrIdx = String(idx);
      lineEl.dataset.lyrTime = String(ln.time);
      lineEl.textContent = ln.text;
      lineEl.style.transition = 'opacity 900ms cubic-bezier(0.22, 1, 0.36, 1), transform 900ms cubic-bezier(0.22, 1, 0.36, 1), color 900ms cubic-bezier(0.22, 1, 0.36, 1), filter 900ms cubic-bezier(0.22, 1, 0.36, 1)';
      lineEl.style.color = 'rgba(255,255,255,0.35)';
      lineEl.style.opacity = '0.55';
      lineEl.style.transform = 'translateZ(0) scale(0.94)';
      lineEl.style.transformOrigin = 'left center';
      lineEl.style.filter = 'blur(0.5px)';
      lineEl.onclick = () => { audio.currentTime = ln.time; };
      inner.appendChild(lineEl);
    });

    // Auto-scroll: highlight + center
    let lastActiveIdx = -1;
    const unsubLyrics = onTimeUpdate((cur) => {
      if (!document.body.contains(overlay)) { unsubLyrics(); return; }
      let activeIdx = -1;
      for (let i = 0; i < t.lyricsSynced.length; i++) {
        if (t.lyricsSynced[i].time <= cur) activeIdx = i;
        else break;
      }
      if (activeIdx === lastActiveIdx) return;
      lastActiveIdx = activeIdx;
      const lines = inner.querySelectorAll('[data-lyr-idx]');
      if (lines.length === 0) return;
      lines.forEach((ln, i) => {
        const dist = Math.abs(i - activeIdx);
        if (i === activeIdx) {
          ln.style.color = 'rgba(255,255,255,1)';
          ln.style.opacity = '1';
          ln.style.transform = 'translateZ(0) scale(1.06)';
          ln.style.filter = 'blur(0)';
        } else if (dist === 1) {
          ln.style.color = 'rgba(255,255,255,0.6)';
          ln.style.opacity = '0.9';
          ln.style.transform = 'translateZ(0) scale(0.99)';
          ln.style.filter = 'blur(0)';
        } else if (dist <= 3) {
          ln.style.color = 'rgba(255,255,255,0.4)';
          ln.style.opacity = '0.7';
          ln.style.transform = 'translateZ(0) scale(0.96)';
          ln.style.filter = 'blur(0.4px)';
        } else {
          ln.style.color = 'rgba(255,255,255,0.25)';
          ln.style.opacity = '0.45';
          ln.style.transform = 'translateZ(0) scale(0.94)';
          ln.style.filter = 'blur(0.8px)';
        }
      });
      const activeLine = lines[activeIdx];
      if (!activeLine) return;
      const lineCenter = activeLine.offsetTop + (activeLine.offsetHeight / 2);
      inner.style.transform = `translateY(${-lineCenter}px)`;
    });
    overlay.appendChild(body);
  } else if (t.lyrics) {
    // === Plain text: scroll biasa ===
    const body = el('div', 'flex-1 overflow-y-auto scroll-y px-6 py-6 z-10');
    const pre = el('pre', 'whitespace-pre-wrap text-white text-lg leading-relaxed font-sans font-semibold pb-8');
    pre.textContent = t.lyrics;
    body.appendChild(pre);
    overlay.appendChild(body);
  } else {
    // Tidak ada lirik (seharusnya tidak terjadi karena tombol LIRIK hanya muncul kalau ada)
    const body = el('div', 'flex-1 flex items-center justify-center text-white/60 z-10');
    body.textContent = 'Belum ada lirik';
    overlay.appendChild(body);
  }

  // Bottom mini player bar — progress + play/pause supaya user bisa kontrol tanpa harus close lirik
  const bottom = el('div', 'px-6 pb-4 pt-2 z-10');

  // Seek bar
  const seek = el('input', 'seek');
  seek.type = 'range'; seek.min = 0; seek.max = audio.duration || 0; seek.step = 0.1; seek.value = audio.currentTime || 0;
  const initPct = (audio.currentTime / (audio.duration || 1)) * 100 || 0;
  seek.style.background = `linear-gradient(to right, #fff 0%, #fff ${initPct}%, rgba(255,255,255,0.3) ${initPct}%, rgba(255,255,255,0.3) 100%)`;
  let seekingL = false;
  seek.addEventListener('pointerdown', () => { seekingL = true; });
  seek.addEventListener('pointerup', () => { seekingL = false; });
  seek.addEventListener('touchstart', () => { seekingL = true; }, { passive: true });
  seek.addEventListener('touchend', () => { seekingL = false; });
  seek.oninput = (e) => audio.currentTime = parseFloat(e.target.value);
  bottom.appendChild(seek);

  // Times + play/pause row
  const ctrlRow = el('div', 'flex items-center justify-between mt-1');
  const tCurL = el('span', 'text-xs text-white/70', fmt(audio.currentTime || 0));
  ctrlRow.appendChild(tCurL);
  const playBtn = el('button', 'w-12 h-12 bg-white text-black rounded-full flex items-center justify-center active:scale-95 transition');
  playBtn.innerHTML = svgIcon(state.isPlaying ? 'pause' : 'play', 22);
  playBtn.onclick = () => togglePlay();
  ctrlRow.appendChild(playBtn);
  const tDurL = el('span', 'text-xs text-white/70', fmt(audio.duration || 0));
  ctrlRow.appendChild(tDurL);
  bottom.appendChild(ctrlRow);

  const unsubTimeL = onTimeUpdate((cur, dur) => {
    if (!seek.isConnected) { unsubTimeL(); return; }
    if (!seekingL) {
      seek.max = dur || 0;
      seek.value = cur || 0;
      const p = (cur / (dur || 1)) * 100 || 0;
      seek.style.background = `linear-gradient(to right, #fff 0%, #fff ${p}%, rgba(255,255,255,0.3) ${p}%, rgba(255,255,255,0.3) 100%)`;
      tCurL.textContent = fmt(cur || 0);
    }
    tDurL.textContent = fmt(dur || 0);
  });
  const unsubPlay = subscribe(() => {
    if (!playBtn.isConnected) { unsubPlay(); return; }
    playBtn.innerHTML = svgIcon(state.isPlaying ? 'pause' : 'play', 22);
  });

  overlay.appendChild(bottom);
  return overlay;
}

function labelContextType(t) {
  if (t === 'playlist') return 'PLAYLIST';
  if (t === 'album') return 'ALBUM';
  if (t === 'artist') return 'ARTIS';
  return 'KOLEKSI';
}

// ----- Queue Sheet -----
function renderQueueSheet() {
  const overlay = el('div', 'fixed inset-0 z-50 flex flex-col');
  // Close-with-animation handler (dipake oleh tap-close, tombol X, dan backdrop)
  const doClose = () => closeSheetWithAnim(overlay, sheet, () => setState({ queueSheetOpen: false }));

  // Behind: blurred cover (backdrop)
  const t = state.currentTrack;
  const back = el('div', 'absolute inset-0 sheet-backdrop-bg');
  if (t) {
    const cu = coverUrl(t);
    if (cu) {
      const bg = el('div', 'absolute inset-0');
      bg.style.background = `url(${cu})`;
      bg.style.backgroundSize = 'cover';
      bg.style.backgroundPosition = 'center';
      bg.style.filter = 'blur(40px) brightness(0.5)';
      bg.style.transform = 'scale(1.2)';
      back.appendChild(bg);
    }
    const dim = el('div', 'absolute inset-0 bg-black/50');
    back.appendChild(dim);
  }
  overlay.appendChild(back);

  // Tap-to-close area di atas
  const tapClose = el('div', 'flex-1');
  tapClose.onclick = doClose;
  overlay.appendChild(tapClose);

  // Sheet
  const sheet = el('div', 'relative bg-spo-surface rounded-t-2xl animate-slide-up max-h-[85vh] flex flex-col');
  // Handle bar
  const handle = el('div', 'flex justify-center pt-2 pb-1');
  handle.innerHTML = '<div class="w-10 h-1 bg-white/40 rounded-full"></div>';
  sheet.appendChild(handle);

  // Header
  const header = el('div', 'px-5 pt-2 pb-3 relative');
  // Close button (X) — eksplisit, gampang di-tap
  const closeBtn = el('button', 'absolute top-2 right-3 w-9 h-9 flex items-center justify-center rounded-full hover:bg-white/10 active:bg-white/20');
  closeBtn.innerHTML = svgIcon('close', 22);
  closeBtn.setAttribute('aria-label', 'Tutup');
  closeBtn.onclick = (e) => { e.stopPropagation(); doClose(); };
  header.appendChild(closeBtn);
  header.appendChild(el('h2', 'text-2xl font-bold pr-10', 'Antrean'));
  header.appendChild(el('div', 'text-sm', `Memutar `));
  const ctx = state.queueContext;
  if (ctx) {
    header.querySelector('div').innerHTML = `Memutar <span class="font-bold">${escapeHtml(ctx.name)}</span>`;
  }
  sheet.appendChild(header);

  const list = el('div', 'flex-1 overflow-y-auto scroll-y px-5 pb-4');

  // Currently playing
  if (state.currentTrack) {
    const cur = el('div', 'flex items-center gap-3 py-3');
    const cov = el('div', 'w-12 h-12 bg-spo-elevated rounded flex-shrink-0');
    const cu2 = coverUrl(state.currentTrack);
    if (cu2) cov.style.backgroundImage = `url(${cu2})`, cov.style.backgroundSize = 'cover';
    cur.appendChild(cov);
    const meta = el('div', 'flex-1 min-w-0');
    const tit = el('div', 'flex items-center gap-2 text-spo-green font-semibold truncate');
    tit.innerHTML = `<div class="eq-bars"><span></span><span></span><span></span></div><span class="truncate">${escapeHtml(state.currentTrack.title)}</span>`;
    meta.appendChild(tit);
    meta.appendChild(el('div', 'text-sm text-spo-textMuted truncate', state.currentTrack.artist));
    cur.appendChild(meta);
    const pp = el('button', 'w-9 h-9 bg-white text-black rounded-full flex items-center justify-center');
    pp.innerHTML = svgIcon(state.isPlaying ? 'pause' : 'play', 16);
    pp.onclick = togglePlay;
    cur.appendChild(pp);
    list.appendChild(cur);
  }

  // Section header
  const upcoming = state.queue.slice(state.queueIndex + 1);
  if (upcoming.length > 0) {
    const sec = el('div', 'flex items-center gap-2 mt-3 mb-2 text-sm text-spo-textMuted');
    if (state.shuffle) {
      sec.innerHTML = svgIcon('shuffle', 16) + '<span>Shuffling dari:</span>';
    } else {
      sec.textContent = 'Selanjutnya:';
    }
    list.appendChild(sec);

    upcoming.forEach((tr, i) => {
      const row = el('div', 'flex items-center gap-3 py-2');
      row.dataset.qidx = String(i);
      const cov = el('div', 'w-12 h-12 bg-spo-elevated rounded flex-shrink-0');
      const cu3 = coverUrl(tr);
      if (cu3) cov.style.backgroundImage = `url(${cu3})`, cov.style.backgroundSize = 'cover';
      row.appendChild(cov);
      const meta = el('div', 'flex-1 min-w-0');
      meta.appendChild(el('div', 'font-semibold truncate', tr.title));
      meta.appendChild(el('div', 'text-sm text-spo-textMuted truncate', tr.artist));
      row.appendChild(meta);
      const handle = el('div', 'drag-handle p-2 text-white/60');
      handle.innerHTML = svgIcon('handle', 18);
      handle.draggable = true;
      handle.addEventListener('dragstart', (e) => {
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('qidx', String(i));
      });
      row.addEventListener('dragover', (e) => { e.preventDefault(); row.classList.add('drag-over'); });
      row.addEventListener('dragleave', () => row.classList.remove('drag-over'));
      row.addEventListener('drop', (e) => {
        e.preventDefault();
        const from = parseInt(e.dataTransfer.getData('qidx'), 10);
        row.classList.remove('drag-over');
        if (from !== i) reorderQueue(from, i);
      });
      // Touch
      let touchOrigin = null;
      handle.addEventListener('touchstart', (e) => {
        touchOrigin = i;
        row.classList.add('dragging');
      });
      handle.addEventListener('touchmove', (e) => {
        e.preventDefault();
        const touch = e.touches[0];
        const target = document.elementFromPoint(touch.clientX, touch.clientY);
        const targetRow = target?.closest('[data-qidx]');
        document.querySelectorAll('[data-qidx]').forEach(r => r.classList.remove('drag-over'));
        if (targetRow) targetRow.classList.add('drag-over');
      }, { passive: false });
      handle.addEventListener('touchend', (e) => {
        const touch = e.changedTouches[0];
        const target = document.elementFromPoint(touch.clientX, touch.clientY);
        const targetRow = target?.closest('[data-qidx]');
        row.classList.remove('dragging');
        document.querySelectorAll('[data-qidx]').forEach(r => r.classList.remove('drag-over'));
        if (targetRow) {
          const to = parseInt(targetRow.dataset.qidx, 10);
          if (touchOrigin !== to) reorderQueue(touchOrigin, to);
        }
      });
      row.appendChild(handle);
      // tap to play that track
      row.onclick = () => {
        const realIdx = state.queueIndex + 1 + i;
        setState({ queueIndex: realIdx });
        loadAndPlay(state.queue[realIdx]);
      };
      list.appendChild(row);
    });
  } else {
    list.appendChild(el('div', 'text-center text-spo-textMuted py-6', 'Tidak ada lagu berikutnya'));
  }
  sheet.appendChild(list);

  // Footer: Shuffle + Sleep timer
  const footer = el('div', 'flex gap-2 px-5 pb-5 pt-3 border-t border-white/10');
  const shuf = el('button', `flex-1 flex flex-col items-center gap-1 py-3 rounded-md ${state.shuffle ? 'text-spo-green' : 'text-white'}`);
  shuf.style.background = 'rgba(255,255,255,0.07)';
  shuf.innerHTML = svgIcon('shuffle', 22) + '<span class="text-xs font-semibold">Shuffle</span>';
  shuf.onclick = toggleShuffle;
  footer.appendChild(shuf);
  const slp = el('button', `flex-1 flex flex-col items-center gap-1 py-3 rounded-md ${state.sleepTimerEndsAt || state.sleepTimerEndOfTrack ? 'text-spo-green' : 'text-white'}`);
  slp.style.background = 'rgba(255,255,255,0.07)';
  slp.innerHTML = svgIcon('timer', 22) + '<span class="text-xs font-semibold">Pengatur Waktu</span>';
  slp.onclick = () => setState({ sleepTimerSheetOpen: true });
  footer.appendChild(slp);
  sheet.appendChild(footer);

  overlay.appendChild(sheet);
  return overlay;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));
}

// ----- Sleep Timer Sheet -----
function renderSleepTimerSheet() {
  const overlay = el('div', 'fixed inset-0 z-[60] flex flex-col sheet-backdrop');
  const sheet = el('div', 'bg-spo-sheet rounded-t-2xl animate-slide-up safe-bottom');
  const doClose = () => closeSheetWithAnim(overlay, sheet, () => setState({ sleepTimerSheetOpen: false }));
  overlay.onclick = (e) => { if (e.target === overlay) doClose(); };
  overlay.appendChild(el('div', 'flex-1'));

  // Handle
  sheet.appendChild(el('div', 'flex justify-center pt-2 pb-2',));
  sheet.lastChild.innerHTML = '<div class="w-10 h-1 bg-white/40 rounded-full"></div>';
  // Title row dengan tombol close
  const titleRow = el('div', 'relative py-3 border-b border-white/10');
  titleRow.appendChild(el('div', 'text-center font-bold', 'Pengatur waktu tidur'));
  const closeSlp = el('button', 'absolute top-1/2 right-3 -translate-y-1/2 w-9 h-9 flex items-center justify-center rounded-full hover:bg-white/10 active:bg-white/20');
  closeSlp.innerHTML = svgIcon('close', 20);
  closeSlp.setAttribute('aria-label', 'Tutup');
  closeSlp.onclick = (e) => { e.stopPropagation(); doClose(); };
  titleRow.appendChild(closeSlp);
  sheet.appendChild(titleRow);

  const opts = [
    { label: '5 menit', val: 5 },
    { label: '10 menit', val: 10 },
    { label: '15 menit', val: 15 },
    { label: '30 menit', val: 30 },
    { label: '45 menit', val: 45 },
    { label: '1 jam', val: 60 },
    { label: 'Akhir lagu', val: 'end_of_track' },
  ];
  if (state.sleepTimerEndsAt || state.sleepTimerEndOfTrack) {
    opts.unshift({ label: 'Matikan', val: 'off' });
  }
  opts.forEach(o => {
    const b = el('button', 'w-full text-left px-5 py-4 hover:bg-white/5 transition border-b border-white/5');
    b.textContent = o.label;
    if (o.val === 'off') b.className += ' text-red-400';
    b.onclick = () => {
      if (o.val === 'off') clearSleepTimer();
      else setSleepTimer(o.val);
      doClose();
    };
    sheet.appendChild(b);
  });

  overlay.appendChild(sheet);
  return overlay;
}

function makeToggleRow(title, desc, initialValue, onChange) {
  const row = el('div', 'flex items-start gap-3 px-5 py-3');
  const text = el('div', 'flex-1 min-w-0');
  text.appendChild(el('div', 'font-semibold', title));
  text.appendChild(el('div', 'text-xs text-spo-textMuted mt-0.5', desc));
  row.appendChild(text);
  const switchEl = el('button', `flex-shrink-0 w-12 h-7 rounded-full transition-colors relative ${initialValue ? 'bg-spo-green' : 'bg-white/20'}`);
  const knob = el('div', `absolute top-1 w-5 h-5 rounded-full bg-white shadow transition-all ${initialValue ? 'left-6' : 'left-1'}`);
  switchEl.appendChild(knob);
  let val = initialValue;
  switchEl.onclick = (e) => {
    e.stopPropagation();
    val = !val;
    if (val) {
      switchEl.classList.remove('bg-white/20'); switchEl.classList.add('bg-spo-green');
      knob.classList.remove('left-1'); knob.classList.add('left-6');
    } else {
      switchEl.classList.add('bg-white/20'); switchEl.classList.remove('bg-spo-green');
      knob.classList.add('left-1'); knob.classList.remove('left-6');
    }
    onChange(val);
  };
  row.appendChild(switchEl);
  return row;
}

// ----- Duplicate Finder Dialog -----
async function openDedupeFinder() {
  const dialog = el('div', 'fixed inset-0 z-[70] flex flex-col bg-spo-bg safe-top safe-bottom');

  // Top bar
  const top = el('div', 'flex items-center p-3 border-b border-white/10 flex-shrink-0');
  const close = el('button', 'p-2');
  close.innerHTML = svgIcon('close', 22);
  close.onclick = () => dialog.remove();
  top.appendChild(close);
  top.appendChild(el('div', 'flex-1 text-center font-bold truncate px-2', 'Cari Lagu Duplikat'));
  top.appendChild(el('div', 'w-9'));
  dialog.appendChild(top);

  // Body — scrollable
  const body = el('div', 'flex-1 overflow-y-auto scroll-y p-4');
  dialog.appendChild(body);

  // Progress / scanning state
  const progressBox = el('div', 'flex flex-col items-center justify-center py-12');
  progressBox.appendChild(el('div', 'text-spo-green mb-4 animate-pulse', '🔍'));
  const progressText = el('div', 'text-sm text-spo-textMuted', 'Menyiapkan...');
  progressBox.appendChild(progressText);
  const progressBar = el('div', 'mt-4 w-64 h-1.5 bg-white/10 rounded-full overflow-hidden');
  const progressFill = el('div', 'h-full bg-spo-green transition-all duration-300');
  progressFill.style.width = '0%';
  progressBar.appendChild(progressFill);
  progressBox.appendChild(progressBar);
  body.appendChild(progressBox);

  document.body.appendChild(dialog);

  // Scan!
  const result = await findDuplicateGroups(({ phase, current, total }) => {
    if (phase === 'hash') {
      progressText.textContent = `Menghitung hash audio... (${current}/${total})`;
      progressFill.style.width = `${(current / total) * 100}%`;
    } else if (phase === 'done') {
      progressText.textContent = 'Selesai!';
      progressFill.style.width = '100%';
    }
  });

  // Tampilkan hasil
  body.innerHTML = '';

  const total = result.identical.length + result.similar.length;
  if (total === 0) {
    const ok = el('div', 'flex flex-col items-center justify-center py-12 text-center');
    ok.appendChild(el('div', 'text-5xl mb-3', '✨'));
    ok.appendChild(el('div', 'text-lg font-bold mb-1', 'Bersih!'));
    ok.appendChild(el('div', 'text-sm text-spo-textMuted', 'Tidak ada lagu duplikat di koleksimu.'));
    body.appendChild(ok);
    return;
  }

  // Summary
  const summary = el('div', 'bg-spo-elevated rounded-xl p-4 mb-4');
  const countTotalDup = result.identical.reduce((a, g) => a + g.tracks.length - 1, 0)
                     + result.similar.reduce((a, g) => a + g.tracks.length - 1, 0);
  summary.appendChild(el('div', 'text-lg font-bold mb-1', `Ditemukan ${countTotalDup} lagu duplikat`));
  summary.appendChild(el('div', 'text-sm text-spo-textMuted',
    `${result.identical.length} grup file identik · ${result.similar.length} grup judul mirip`));
  body.appendChild(summary);

  // Quick action: hapus semua duplikat identik otomatis (pertahankan yang paling lama)
  if (result.identical.length > 0) {
    const quickBox = el('div', 'bg-spo-green/10 border border-spo-green/30 rounded-xl p-4 mb-4');
    quickBox.appendChild(el('div', 'font-bold mb-1', '⚡ Aksi cepat'));
    const quickTotal = result.identical.reduce((a, g) => a + g.tracks.length - 1, 0);
    quickBox.appendChild(el('div', 'text-sm text-spo-textMuted mb-3',
      `${quickTotal} file identik 100% bisa dihapus aman. Yang dipertahankan: lagu yang paling dulu di-import.`));
    const quickBtn = el('button', 'w-full px-4 py-2.5 bg-spo-green text-black font-bold rounded-full text-sm');
    quickBtn.textContent = `Hapus ${quickTotal} duplikat otomatis`;
    quickBtn.onclick = async () => {
      if (!confirm(`Hapus ${quickTotal} file duplikat identik? Yang dipertahankan: file yang paling dulu di-import di tiap grup.`)) return;
      const toDelete = [];
      for (const g of result.identical) {
        // Keep first (oldest), delete rest
        for (let i = 1; i < g.tracks.length; i++) toDelete.push(g.tracks[i].id);
      }
      quickBtn.disabled = true;
      quickBtn.textContent = 'Menghapus...';
      await deleteTracks(toDelete);
      showToast(`✓ ${toDelete.length} duplikat dihapus`, 2500, 'success');
      dialog.remove();
      // Buka ulang untuk scan similar
      setTimeout(() => openDedupeFinder(), 400);
    };
    quickBox.appendChild(quickBtn);
    body.appendChild(quickBox);
  }

  // Group renderer
  const renderGroup = (group, groupIdx) => {
    const card = el('div', 'bg-spo-elevated rounded-xl p-3 mb-3');
    const head = el('div', 'flex items-start gap-2 mb-3');
    const badge = el('div', `text-xs font-bold px-2 py-0.5 rounded ${group.type === 'identical' ? 'bg-spo-green/20 text-spo-green' : 'bg-yellow-500/20 text-yellow-400'}`);
    badge.textContent = group.type === 'identical' ? 'IDENTIK' : 'MIRIP';
    head.appendChild(badge);
    head.appendChild(el('div', 'flex-1 text-xs text-spo-textMuted', group.reason));
    card.appendChild(head);

    // Track list dengan checkbox (yang dicentang = pertahankan)
    // Default: yang oldest (index 0) di-keep, sisanya di-hapus
    const keepSet = new Set([group.tracks[0].id]);

    const list = el('div', 'space-y-2');
    group.tracks.forEach((t, idx) => {
      const row = el('div', 'flex items-center gap-3 p-2 rounded-lg bg-black/30');
      const cu = coverUrl(t);
      const cov = el('div', 'w-12 h-12 bg-spo-bg rounded flex-shrink-0');
      if (cu) { cov.style.backgroundImage = `url(${cu})`; cov.style.backgroundSize = 'cover'; cov.style.backgroundPosition = 'center'; }
      row.appendChild(cov);
      const meta = el('div', 'flex-1 min-w-0');
      meta.appendChild(el('div', 'text-sm font-semibold truncate', t.title));
      meta.appendChild(el('div', 'text-xs text-spo-textMuted truncate', `${t.artist} • ${fmt(t.duration || 0)} • ${((t.blob?.size || 0) / 1024 / 1024).toFixed(1)} MB`));
      const dateStr = t.addedAt ? new Date(t.addedAt).toLocaleDateString('id-ID', { day:'numeric', month:'short', year:'numeric' }) : '';
      if (dateStr) meta.appendChild(el('div', 'text-xs text-spo-textMuted truncate', `Diimport ${dateStr}`));
      row.appendChild(meta);

      // Radio button: pilih mana yang dipertahankan
      const radio = el('button', 'flex-shrink-0 w-7 h-7 rounded-full border-2 flex items-center justify-center transition');
      const updateRadio = () => {
        if (keepSet.has(t.id)) {
          radio.classList.add('border-spo-green', 'bg-spo-green');
          radio.classList.remove('border-white/30');
          radio.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5 9-11"/></svg>';
        } else {
          radio.classList.remove('border-spo-green', 'bg-spo-green');
          radio.classList.add('border-white/30');
          radio.innerHTML = '';
        }
      };
      updateRadio();
      radio.onclick = () => {
        // Toggle: pertahankan hanya yang dipilih (others di-hapus)
        keepSet.clear();
        keepSet.add(t.id);
        // Refresh semua radio di grup ini
        list.querySelectorAll('[data-radio-track]').forEach((r) => {
          const tid = r.getAttribute('data-radio-track');
          if (keepSet.has(tid)) {
            r.classList.add('border-spo-green', 'bg-spo-green');
            r.classList.remove('border-white/30');
            r.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5 9-11"/></svg>';
          } else {
            r.classList.remove('border-spo-green', 'bg-spo-green');
            r.classList.add('border-white/30');
            r.innerHTML = '';
          }
        });
      };
      radio.setAttribute('data-radio-track', t.id);
      row.appendChild(radio);

      list.appendChild(row);
    });
    card.appendChild(list);

    // Action button untuk grup ini
    const actions = el('div', 'flex gap-2 mt-3');
    const delBtn = el('button', 'flex-1 px-3 py-2 bg-red-600 hover:bg-red-700 text-white font-semibold rounded-full text-sm transition');
    delBtn.textContent = 'Hapus yang lain';
    delBtn.onclick = async () => {
      const toDelete = group.tracks.filter(t => !keepSet.has(t.id)).map(t => t.id);
      if (toDelete.length === 0) {
        showToast('Pilih dulu yang mau dipertahankan', 2000);
        return;
      }
      delBtn.disabled = true;
      delBtn.textContent = 'Menghapus...';
      await deleteTracks(toDelete);
      // Fade out card
      card.style.transition = 'opacity 300ms, transform 300ms';
      card.style.opacity = '0';
      card.style.transform = 'scale(0.95)';
      setTimeout(() => { card.remove(); }, 320);
      showToast(`${toDelete.length} duplikat dihapus`, 1800, 'success');
    };
    actions.appendChild(delBtn);
    const skipBtn = el('button', 'px-4 py-2 bg-white/10 hover:bg-white/15 text-white font-semibold rounded-full text-sm transition');
    skipBtn.textContent = 'Lewati';
    skipBtn.onclick = () => {
      card.style.transition = 'opacity 250ms';
      card.style.opacity = '0.3';
      delBtn.disabled = true;
      skipBtn.disabled = true;
    };
    actions.appendChild(skipBtn);
    card.appendChild(actions);

    return card;
  };

  // Sections
  if (result.identical.length > 0) {
    body.appendChild(el('div', 'text-xs uppercase tracking-wider text-spo-textMuted mt-4 mb-2 px-1',
      `${result.identical.length} grup file identik`));
    result.identical.forEach((g, i) => body.appendChild(renderGroup(g, i)));
  }
  if (result.similar.length > 0) {
    body.appendChild(el('div', 'text-xs uppercase tracking-wider text-spo-textMuted mt-4 mb-2 px-1',
      `${result.similar.length} grup judul mirip (perlu konfirmasi)`));
    result.similar.forEach((g, i) => body.appendChild(renderGroup(g, i)));
  }
  // Bottom padding
  body.appendChild(el('div', 'h-8'));
}

// ----- Lyrics Editor -----
function openLyricsEditor(track) {
  const dialog = el('div', 'fixed inset-0 z-[70] flex flex-col bg-spo-bg safe-top safe-bottom');
  // Top bar
  const top = el('div', 'flex items-center p-3 border-b border-white/10 flex-shrink-0');
  const close = el('button', 'p-2');
  close.innerHTML = svgIcon('close', 22);
  close.onclick = () => dialog.remove();
  top.appendChild(close);
  top.appendChild(el('div', 'flex-1 text-center font-bold truncate px-2', `Lirik — ${track.title}`));
  const save = el('button', 'px-4 py-1.5 bg-spo-green text-black font-bold rounded-full text-sm');
  save.textContent = 'Simpan';
  top.appendChild(save);
  dialog.appendChild(top);

  // Tip
  const tip = el('div', 'px-4 py-2 bg-white/5 text-xs text-spo-textMuted flex-shrink-0');
  tip.innerHTML = 'Paste lirik plain text, atau format LRC (<code>[mm:ss.xx]Lirik</code>) untuk auto-sync mengikuti lagu.';
  dialog.appendChild(tip);

  // Auto-fetch button (LRCLIB)
  const fetchRow = el('div', 'px-4 py-2 flex items-center gap-2 border-b border-white/10 flex-shrink-0');
  const fetchBtn = el('button', 'flex-1 flex items-center justify-center gap-2 py-2 bg-spo-elevated hover:bg-white/15 rounded-md text-sm font-semibold transition');
  fetchBtn.innerHTML = svgIcon('search', 16) + '<span>Cari otomatis (LRCLIB)</span>';
  const fetchStatus = el('div', 'text-xs text-spo-textMuted');
  fetchBtn.onclick = async () => {
    fetchBtn.disabled = true;
    fetchBtn.innerHTML = '<span class="animate-pulse">Mencari di LRCLIB...</span>';
    fetchStatus.textContent = '';
    try {
      const result = await fetchLyricsFromLrclib(track);
      if (result.ok) {
        ta.value = result.text;
        fetchStatus.textContent = result.isSynced ? '✓ Lirik sinkron ditemukan!' : '✓ Lirik plain ditemukan';
        fetchStatus.className = 'text-xs text-spo-green';
      } else {
        fetchStatus.textContent = '✗ ' + result.error;
        fetchStatus.className = 'text-xs text-red-400';
      }
    } catch (e) {
      fetchStatus.textContent = '✗ Error: ' + e.message;
      fetchStatus.className = 'text-xs text-red-400';
    }
    fetchBtn.disabled = false;
    fetchBtn.innerHTML = svgIcon('search', 16) + '<span>Cari lagi</span>';
  };
  fetchRow.appendChild(fetchBtn);
  dialog.appendChild(fetchRow);
  const statusRow = el('div', 'px-4 pb-1 flex-shrink-0');
  statusRow.appendChild(fetchStatus);
  dialog.appendChild(statusRow);

  // Textarea
  const ta = el('textarea', 'flex-1 w-full bg-transparent text-white p-4 outline-none resize-none font-mono text-sm');
  ta.placeholder = 'Paste lirik di sini...\n\nContoh format LRC (auto-sync):\n[00:12.00]Baris pertama lirik\n[00:18.50]Baris kedua\n[00:25.00]dst\n\nAtau klik tombol "Cari otomatis" di atas untuk fetch dari LRCLIB.';
  ta.value = track.lyrics || '';
  dialog.appendChild(ta);

  save.onclick = async () => {
    save.disabled = true;
    save.textContent = '...';
    await setTrackLyrics(track.id, ta.value);
    dialog.remove();
  };

  document.body.appendChild(dialog);
  setTimeout(() => ta.focus(), 100);
}

// ----- Import Dialog -----
function renderImportDialog() {
  const overlay = el('div', 'fixed inset-0 z-[55] flex items-center justify-center sheet-backdrop p-4');
  overlay.onclick = (e) => { if (e.target === overlay) setState({ importDialogOpen: false }); };
  const dialog = el('div', 'bg-spo-sheet rounded-2xl p-6 w-full max-w-md');
  dialog.appendChild(el('h3', 'text-xl font-bold mb-2', 'Import lagu'));
  dialog.appendChild(el('p', 'text-sm text-spo-textMuted mb-4', 'Pilih file MP3, M4A, FLAC, WAV, atau OGG. Tambah file .lrc/.txt dengan nama yang sama untuk lirik.'));

  const drop = el('div', 'border-2 border-dashed border-white/20 rounded-lg p-8 text-center cursor-pointer hover:border-spo-green transition');
  drop.innerHTML = `<div class="text-4xl mb-2">📁</div><div class="font-semibold">Tap untuk pilih file</div><div class="text-xs text-spo-textMuted mt-1">atau drag & drop di sini</div>`;
  const input = el('input', 'hidden');
  input.type = 'file'; input.multiple = true; input.accept = 'audio/*,.mp3,.m4a,.flac,.wav,.ogg,.aac,.lrc,.txt';
  drop.onclick = () => input.click();
  input.onchange = async (e) => {
    drop.innerHTML = '<div class="text-spo-green">Mengimpor...</div>';
    await importFiles(e.target.files);
    setState({ importDialogOpen: false });
  };
  drop.ondragover = (e) => { e.preventDefault(); drop.classList.add('border-spo-green'); };
  drop.ondragleave = () => drop.classList.remove('border-spo-green');
  drop.ondrop = async (e) => {
    e.preventDefault();
    drop.classList.remove('border-spo-green');
    drop.innerHTML = '<div class="text-spo-green">Mengimpor...</div>';
    await importFiles(e.dataTransfer.files);
    setState({ importDialogOpen: false });
  };
  dialog.appendChild(drop);
  dialog.appendChild(input);

  const close = el('button', 'mt-4 text-spo-textMuted text-sm w-full');
  close.textContent = 'Batal';
  close.onclick = () => setState({ importDialogOpen: false });
  dialog.appendChild(close);

  overlay.appendChild(dialog);
  return overlay;
}

// =====================================================================
// History API: tombol kembali Android = tutup overlay, BUKAN keluar app
// =====================================================================
// Strategi: tiap kali ada overlay/sheet/sub-view yang terbuka, push 1 entry
// ke history. Saat user tekan tombol kembali → popstate fired → kita tutup
// overlay teratas, dan history TIDAK pop ke luar app.
//
// Yang kita track (urutan = prioritas tutup, paling depan dulu):
// 1. contextMenuTrack    — track ⋯ menu
// 2. sleepTimerSheetOpen — sleep timer
// 3. queueSheetOpen      — antrean
// 4. fullPlayerOpen      — full player
// 5. view sub-view       — album/artist/playlist (bukan home/search/library)

let _historySyncing = false;
let _lastHistoryDepth = 0;

function getOverlayDepth() {
  let d = 0;
  // sub-view (album/artist/playlist) hitungan 1 kalau bukan tab utama
  const mainTabs = ['home', 'search', 'library'];
  if (state.view && !mainTabs.includes(state.view)) d++;
  if (state.fullPlayerOpen) d++;
  if (state.lyricsPageOpen) d++;
  if (state.queueSheetOpen) d++;
  if (state.sleepTimerSheetOpen) d++;
  if (state.settingsSheetOpen) d++;
  if (state.contextMenuTrack) d++;
  return d;
}

function syncHistory() {
  if (_historySyncing) return;
  const depth = getOverlayDepth();
  if (depth > _lastHistoryDepth) {
    // Tambah entries baru
    _historySyncing = true;
    for (let i = _lastHistoryDepth; i < depth; i++) {
      history.pushState({ sonara: true, depth: i + 1 }, '');
    }
    _historySyncing = false;
  } else if (depth < _lastHistoryDepth) {
    // Pop entries — back() depthDiff kali. Tapi jangan call back kalau popstate-nya yg trigger ini.
    // Kita handle implisit: popstate listener udah ngubah state, jadi disini cukup update _lastHistoryDepth.
  }
  _lastHistoryDepth = depth;
}

// ----- Toast notification (untuk pesan singkat seperti "Tekan kembali sekali lagi") -----
let _toastEl = null;
let _toastTimer = null;
function showToast(message, duration = 2000, type = 'default') {
  if (_toastTimer) clearTimeout(_toastTimer);
  if (_toastEl) _toastEl.remove();
  let cls = 'fixed bottom-24 left-1/2 -translate-x-1/2 px-4 py-2 rounded-full text-sm z-[200] animate-fade-in pointer-events-none shadow-lg ';
  if (type === 'success') cls += 'bg-spo-green text-black font-semibold';
  else if (type === 'error') cls += 'bg-red-600 text-white font-semibold';
  else cls += 'bg-black/90 text-white';
  _toastEl = el('div', cls);
  _toastEl.style.maxWidth = '90%';
  // Multi-line allowed untuk pesan panjang
  _toastEl.style.whiteSpace = 'normal';
  _toastEl.style.textAlign = 'center';
  _toastEl.textContent = message;
  document.body.appendChild(_toastEl);
  _toastTimer = setTimeout(() => {
    if (_toastEl) {
      _toastEl.style.transition = 'opacity 250ms';
      _toastEl.style.opacity = '0';
      setTimeout(() => { _toastEl?.remove(); _toastEl = null; }, 260);
    }
  }, duration);
}

let _backTapAt = 0;
window.addEventListener('popstate', (e) => {
  // Tombol kembali ditekan. Tutup overlay paling atas.
  const depth = getOverlayDepth();
  if (depth === 0) {
    // Tidak ada overlay terbuka — kita di tab utama (Home/Cari/Koleksi)
    //
    // Smart navigation:
    // 1. Kalau lagi di Cari atau Koleksi → balik ke Home dulu (kayak Spotify/IG)
    // 2. Kalau udah di Home → toast "tekan lagi untuk keluar"
    // 3. Tap kedua dalam 2 detik → benar-benar keluar app
    //    (TAPI kasih warning kalau lagi play music)
    if (state.view === 'search' || state.view === 'library') {
      // Pindah ke Home dulu, push sentinel baru supaya next-back trigger handler ini lagi
      setState({ view: 'home', viewParam: null });
      history.pushState({ sonara: true, depth: 0, sentinel: true }, '');
      _lastHistoryDepth = 0;
      _backTapAt = 0; // reset
      return;
    }

    // Sudah di Home — handle exit dengan double-tap
    const now = Date.now();
    if (now - _backTapAt < 2000) {
      // Tap kedua — keluar app
      // Tip ke user: kalau lagi play music, lebih baik tekan tombol Home (rumah)
      // supaya musik tetep jalan di background. Tapi kalau user maksa back, kita tetep keluar.
      _lastHistoryDepth = 0;
      return;
    }
    // Tap pertama: tahan supaya nggak keluar app
    _backTapAt = now;
    // Pesan beda kalau lagi play music — edukasi user
    if (!audio.paused) {
      showToast('💡 Tekan tombol Home supaya musik tetap jalan, atau tekan kembali sekali lagi untuk keluar', 2800);
    } else {
      showToast('Tekan kembali sekali lagi untuk keluar', 2000);
    }
    // Push state baru supaya tap kembali berikutnya trigger popstate lagi (bukan keluar)
    history.pushState({ sonara: true, depth: 0, sentinel: true }, '');
    _lastHistoryDepth = 0;
    return;
  }
  _historySyncing = true;

  // Helper: cari overlay aktif yang sedang muncul, animate keluar, lalu setState
  const animateAndClose = (selector, sheetSelector, stateUpdate, isFullPlayer = false) => {
    const overlay = document.querySelector(selector);
    const sheet = sheetSelector ? overlay?.querySelector(sheetSelector) : overlay;
    if (overlay && sheet) {
      closeSheetWithAnim(overlay, sheet, () => setState(stateUpdate), isFullPlayer);
    } else {
      // Fallback: langsung setState kalau elemen nggak ketemu
      setState(stateUpdate);
    }
  };

  // Tutup yang paling depan (urutan prioritas)
  if (state.contextMenuTrack) {
    animateAndClose('.fixed.inset-0.z-\\[55\\]', '.bg-spo-sheet', { contextMenuTrack: null });
  } else if (state.settingsSheetOpen) {
    animateAndClose('.fixed.inset-0.settings-sheet-overlay', '.bg-spo-sheet', { settingsSheetOpen: false });
  } else if (state.sleepTimerSheetOpen) {
    animateAndClose('.fixed.inset-0.z-\\[60\\]', '.bg-spo-sheet', { sleepTimerSheetOpen: false });
  } else if (state.queueSheetOpen) {
    animateAndClose('.fixed.inset-0.z-50', '.bg-spo-surface', { queueSheetOpen: false });
  } else if (state.lyricsPageOpen) {
    animateAndClose('.fixed.inset-0.z-\\[45\\]', null, { lyricsPageOpen: false }, true);
  } else if (state.fullPlayerOpen) {
    animateAndClose('.fixed.inset-0.z-40', null, { fullPlayerOpen: false }, true);
  } else {
    const mainTabs = ['home', 'search', 'library'];
    if (state.view && !mainTabs.includes(state.view)) {
      // Kembali ke library (parent natural untuk album/artist/playlist)
      setState({ view: 'library', viewParam: null });
    }
  }

  _historySyncing = false;
  // Update depth setelah animasi selesai (max 380ms untuk full player)
  setTimeout(() => { _lastHistoryDepth = getOverlayDepth(); }, 400);
});

// Subscribe sync history setiap state berubah
subscribe(() => syncHistory());

// Init: replace state pertama jadi sentinel, lalu push 1 sentinel TAMBAHAN
// supaya popstate pertama (saat user tekan back di tab utama) trigger handler kita
// — bukan langsung keluar app. Ini bagian dari trick "tekan kembali sekali lagi untuk keluar".
history.replaceState({ sonara: true, depth: 0, root: true }, '');
history.pushState({ sonara: true, depth: 0, sentinel: true }, '');

// Service worker — dengan auto-update saat ada versi baru
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then((reg) => {
    // Cek update tiap 1 jam
    setInterval(() => reg.update().catch(() => {}), 60 * 60 * 1000);
    reg.addEventListener('updatefound', () => {
      const newWorker = reg.installing;
      if (!newWorker) return;
      newWorker.addEventListener('statechange', () => {
        if (newWorker.state === 'activated') {
          // Auto-reload supaya pakai versi baru — hanya saat tidak sedang play music
          if (audio.paused) location.reload();
        }
      });
    });
  }).catch(() => {});
}
</script>
</body>
