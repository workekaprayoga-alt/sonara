<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />

<meta name="theme-color" content="#000000" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          spo: {
            bg: '#000000',
            surface: '#121212',
            elevated: '#1a1a1a',
            sheet: '#282828',
            green: '#1DB954',
            greenHover: '#1ed760',
            text: '#ffffff',
            textMuted: '#b3b3b3',
            textSubtle: '#727272',
          }
        },
        fontFamily: {
          sans: ['Figtree', 'system-ui', '-apple-system', 'sans-serif'],
        },
        animation: {
          'slide-up': 'slideUp 380ms cubic-bezier(0.16, 1, 0.3, 1)',
          'slide-down': 'slideDown 340ms cubic-bezier(0.4, 0, 0.2, 1)',

  }
</script>

<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
  * { -webkit-tap-highlight-color: transparent; }
  html, body {
    background: #000;
    color: #fff;
    font-family: 'Figtree', system-ui, sans-serif;
    overscroll-behavior: none;
    height: 100%;
    overflow: hidden;
  }
  #root { height: 100%; }

  /* Hide scrollbars but keep scroll */
  .scroll-y { overflow-y: auto; }
  .scroll-y::-webkit-scrollbar { display: none; }
  .scroll-y { scrollbar-width: none; }

  /* Animations */
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  @keyframes slideDown {
    from { transform: translateY(0); }
    to { transform: translateY(100%); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes fadeOut {
    from { opacity: 1; }
    to { opacity: 0; }
  }
  /* Class util untuk close animation — durasi lebih panjang & easing yg ngereda halus */
  .closing-sheet { animation: slideDown 340ms cubic-bezier(0.4, 0, 0.2, 1) forwards; }
  .closing-backdrop { animation: fadeOut 340ms ease-out forwards; }
  .closing-fullplayer { animation: slideDown 380ms cubic-bezier(0.4, 0, 0.2, 1) forwards; }
  @keyframes eqBar {
    0%, 100% { height: 30%; }
    50% { height: 100%; }
  }

  /* Ken Burns animation — slow zoom-pan untuk cover di full player saat tidak ada canvas video */
  @keyframes kenBurns {
    0%   { transform: scale(1.3) translate(0%, 0%); }
    50%  { transform: scale(1.5) translate(-3%, -2%); }
    100% { transform: scale(1.3) translate(0%, 0%); }
  }
  @keyframes kenBurnsReverse {
    0%   { transform: scale(1.4) translate(0%, 0%); }
    50%  { transform: scale(1.55) translate(3%, 2%); }
    100% { transform: scale(1.4) translate(0%, 0%); }
  }
  .ken-burns {
    animation: kenBurns 28s ease-in-out infinite;
    will-change: transform;
  }
  .ken-burns-reverse {
    animation: kenBurnsReverse 32s ease-in-out infinite;
    will-change: transform;
  }

  /* Equalizer animation (sedang main indicator) */
  .eq-bars {
    display: inline-flex;
    align-items: flex-end;
    gap: 2px;
    height: 14px;
    width: 14px;
  }
  .eq-bars span {
    display: block;
    width: 3px;
    background: #1DB954;
    border-radius: 1px;
    animation: eqBar 1s ease-in-out infinite;
  }
  .eq-bars span:nth-child(1) { animation-delay: -0.4s; }
  .eq-bars span:nth-child(2) { animation-delay: -0.2s; }
  .eq-bars span:nth-child(3) { animation-delay: -0.6s; }

  /* Range slider styling */
  input[type="range"].seek {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 4px;
    background: rgba(255,255,255,0.3);
    border-radius: 2px;
    outline: none;
  }
  input[type="range"].seek::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #fff;
    cursor: pointer;
    border: none;
    transition: transform 0.15s;
  }
  input[type="range"].seek:active::-webkit-slider-thumb {
    transform: scale(1.4);
  }
  input[type="range"].seek::-moz-range-thumb {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #fff;
    cursor: pointer;
    border: none;
  }

  /* Equalizer vertical slider — pakai accent-color modern (Chrome/Firefox/Safari support) */
  .eq-slider {
    accent-color: #1db954;
    cursor: pointer;
  }
  /* Tambah thumb yang lebih besar untuk touch */
  .eq-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: #1db954;
    cursor: pointer;
    border: 2px solid #fff;
    box-shadow: 0 2px 6px rgba(0,0,0,0.4);
  }
  .eq-slider::-moz-range-thumb {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: #1db954;
    cursor: pointer;
    border: 2px solid #fff;
  }

  /* Bottom sheet backdrop */
  .sheet-backdrop {
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
  }

  /* Drag handle for reorder */
  .drag-handle {
    cursor: grab;
    touch-action: none;
  }
  .drag-handle:active { cursor: grabbing; }

  .dragging {
    opacity: 0.5;
    transform: scale(0.98);
  }
  .drag-over {
    border-top: 2px solid #1DB954;
  }

  /* Safe area for iOS notch */
  .safe-top { padding-top: env(safe-area-inset-top); }
  .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }

  /* Line clamp */
  .line-clamp-1 {
    display: -webkit-box;
    -webkit-line-clamp: 1;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .line-clamp-2 {
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* Spotify-style cover shadow */
  .cover-shadow {
    box-shadow: 0 8px 24px rgba(0,0,0,0.5), 0 16px 48px rgba(0,0,0,0.3);
  }

  /* Blurred backdrop di full player */
  .blur-bg {
    filter: blur(80px) saturate(1.2);
    -webkit-filter: blur(80px) saturate(1.2);
    transform: scale(1.4);
    opacity: 0.7;
  }

  /* Disable text selection in UI */
  button, .no-select { user-select: none; -webkit-user-select: none; }
</style>
</head>
<body>
<div id="root"></div>

<script type="module">
// =====================================================================
// SONARA — Versi 2 (Queue, Artist, Album, Sleep timer, Blur, Drag-reorder)
// =====================================================================

// ---------- IndexedDB Storage ----------
const DB_NAME = 'sonara-db';
const DB_VERSION = 3;
const STORE_TRACKS = 'tracks';
const STORE_PLAYLISTS = 'playlists';
const STORE_META = 'meta';
const STORE_OVERRIDES = 'overrides'; // foto artist/album custom
const STORE_HISTORY = 'history'; // listening history per session — untuk Stats Dashboard

let dbInstance = null;

function openDB() {
  if (dbInstance) return Promise.resolve(dbInstance);
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onerror = () => reject(req.error);
    req.onsuccess = () => { dbInstance = req.result; resolve(dbInstance); };
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORE_TRACKS)) {
        db.createObjectStore(STORE_TRACKS, { keyPath: 'id' });
      }
      if (!db.objectStoreNames.contains(STORE_PLAYLISTS)) {
        db.createObjectStore(STORE_PLAYLISTS, { keyPath: 'id' });
      }
      if (!db.objectStoreNames.contains(STORE_META)) {
        db.createObjectStore(STORE_META, { keyPath: 'key' });
      }
      if (!db.objectStoreNames.contains(STORE_OVERRIDES)) {
        db.createObjectStore(STORE_OVERRIDES, { keyPath: 'key' });
      }
      if (!db.objectStoreNames.contains(STORE_HISTORY)) {
        // History entry: { id (auto), trackId, playedAt (ms timestamp), durationListened (sec) }
        const hs = db.createObjectStore(STORE_HISTORY, { keyPath: 'id', autoIncrement: true });
        hs.createIndex('byTime', 'playedAt');
        hs.createIndex('byTrack', 'trackId');
      }
    };
  });
}

async function dbGetAll(store) {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).getAll();
    req.onsuccess = () => res(req.result);
    req.onerror = () => rej(req.error);
  });
}
async function dbGet(store, key) {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).get(key);
    req.onsuccess = () => res(req.result);
    req.onerror = () => rej(req.error);
  });
}
async function dbPut(store, val) {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).put(val);
    let key = null;
    req.onsuccess = () => { key = req.result; };
    tx.oncomplete = () => res(key);
    tx.onerror = () => rej(tx.error);
  });
}
async function dbDelete(store, key) {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readwrite');
    tx.objectStore(store).delete(key);
    tx.oncomplete = () => res();
    tx.onerror = () => rej(tx.error);
  });
}

// ---------- Metadata extraction (jsmediatags via CDN-like inline approach) ----------
// Karena kita full-offline, kita pakai built-in browser parsing untuk basic ID3.
// Untuk title/artist/album pakai pendekatan sederhana: baca ID3v2 tag dari MP3.
async function extractMetadata(file) {
  const meta = {
    title: file.name.replace(/\.[^.]+$/, ''),
    artist: 'Unknown Artist',
    album: 'Unknown Album',
    cover: null,
    duration: 0,
    lyrics: null, // dari USLT atau TXXX:lyrics-XXX (auto-import)
  };

  try {
    // Baca cukup banyak (1 MB) supaya tag besar dengan cover art + lirik panjang tetap ke-parse
    const buf = await file.slice(0, 1024 * 1024).arrayBuffer();
    const view = new Uint8Array(buf);
    // Cek ID3v2 header "ID3"
    if (view[0] === 0x49 && view[1] === 0x44 && view[2] === 0x33) {
      const tagSize = (view[6] << 21) | (view[7] << 14) | (view[8] << 7) | view[9];
      const tagEnd = Math.min(10 + tagSize, view.length);
      let pos = 10;
      while (pos < tagEnd - 10) {
        const frameId = String.fromCharCode(view[pos], view[pos+1], view[pos+2], view[pos+3]);
        const frameSize = (view[pos+4] << 24) | (view[pos+5] << 16) | (view[pos+6] << 8) | view[pos+7];
        if (frameSize <= 0 || frameSize > tagEnd) break;
        const frameStart = pos + 10;
        const frameEnd = frameStart + frameSize;

        if (frameId === 'TIT2') meta.title = decodeID3Text(view, frameStart, frameEnd);
        else if (frameId === 'TPE1') meta.artist = decodeID3Text(view, frameStart, frameEnd);
        else if (frameId === 'TALB') meta.album = decodeID3Text(view, frameStart, frameEnd);
        else if (frameId === 'APIC') {
          // Cover art
          const blob = extractAPIC(view, frameStart, frameEnd);
          if (blob) meta.cover = blob;
        }
        else if (frameId === 'USLT') {
          // Unsynchronized Lyrics (standard ID3v2)
          // Format: encoding(1) + language(3) + content_descriptor(null-term) + actual_lyrics
          const lyr = extractUSLT(view, frameStart, frameEnd);
          if (lyr && !meta.lyrics) meta.lyrics = lyr;
        }
        else if (frameId === 'SYLT') {
          // Synchronized Lyrics — bisa di-parse jadi LRC equivalent
          const synced = extractSYLT(view, frameStart, frameEnd);
          if (synced) meta.lyricsSynced = synced;
        }
        else if (frameId === 'TXXX') {
          // User-defined text frame: encoding(1) + description(null-term) + value
          // Beberapa MP3 (terutama dari YT Music converter) simpan lirik di TXXX dengan description "lyrics-XXX" atau "LYRICS"
          const txxx = extractTXXX(view, frameStart, frameEnd);
          if (txxx && /lyric/i.test(txxx.desc) && txxx.value && txxx.value.length > 20) {
            if (!meta.lyrics) meta.lyrics = txxx.value;
          }
        }
        pos = frameEnd;
      }
    }
  } catch (e) {
    console.warn('Metadata parse failed:', e);
  }

  // Get duration via audio element
  try {
    const url = URL.createObjectURL(file);
    const audio = new Audio();
    audio.src = url;
    await new Promise((res) => {
      audio.addEventListener('loadedmetadata', res, { once: true });
      audio.addEventListener('error', res, { once: true });
      setTimeout(res, 3000);
    });
    meta.duration = audio.duration || 0;
    URL.revokeObjectURL(url);
  } catch {}

  return meta;
}

// Extract USLT (Unsynchronized Lyrics) — standar ID3v2 untuk lirik plain
function extractUSLT(view, start, end) {
  try {
    const encoding = view[start];
    // language: 3 bytes (skip)
    let pos = start + 4;
    // content descriptor (null-terminated, encoding-dependent)
    if (encoding === 1 || encoding === 2) {
      // UTF-16: null = 2 bytes
      while (pos < end - 1 && !(view[pos] === 0 && view[pos+1] === 0)) pos += 2;
      pos += 2; // skip the 2-byte null
    } else {
      while (pos < end && view[pos] !== 0) pos++;
      pos += 1;
    }
    if (pos >= end) return null;
    const data = view.subarray(pos, end);
    let text;
    if (encoding === 0) text = new TextDecoder('iso-8859-1').decode(data);
    else if (encoding === 1 || encoding === 2) text = new TextDecoder('utf-16').decode(data);
    else text = new TextDecoder('utf-8').decode(data);
    text = text.replace(/\0+$/, '').trim();
    return text || null;
  } catch (e) { return null; }
}

// Extract SYLT (Synchronized Lyrics) — return array of {time, text}
function extractSYLT(view, start, end) {
  try {
    const encoding = view[start];
    // skip: encoding(1) + language(3) + time_format(1) + content_type(1)
    let pos = start + 6;
    // content descriptor (null-terminated)
    if (encoding === 1 || encoding === 2) {
      while (pos < end - 1 && !(view[pos] === 0 && view[pos+1] === 0)) pos += 2;
      pos += 2;
    } else {
      while (pos < end && view[pos] !== 0) pos++;
      pos += 1;
    }
    const result = [];
    const decoder = encoding === 0 ? new TextDecoder('iso-8859-1')
      : (encoding === 1 || encoding === 2) ? new TextDecoder('utf-16')
      : new TextDecoder('utf-8');
    while (pos < end - 4) {
      // text (null-terminated) + timestamp (4 bytes big-endian, milliseconds)
      const textStart = pos;
      if (encoding === 1 || encoding === 2) {
        while (pos < end - 1 && !(view[pos] === 0 && view[pos+1] === 0)) pos += 2;
        const text = decoder.decode(view.subarray(textStart, pos)).replace(/\0+$/, '').trim();
        pos += 2;
        if (pos + 4 > end) break;
        const ms = (view[pos] << 24) | (view[pos+1] << 16) | (view[pos+2] << 8) | view[pos+3];
        pos += 4;
        if (text) result.push({ time: ms / 1000, text });
      } else {
        while (pos < end && view[pos] !== 0) pos++;
        const text = decoder.decode(view.subarray(textStart, pos)).trim();
        pos += 1;
        if (pos + 4 > end) break;
        const ms = (view[pos] << 24) | (view[pos+1] << 16) | (view[pos+2] << 8) | view[pos+3];
        pos += 4;
        if (text) result.push({ time: ms / 1000, text });
      }
    }
    return result.length > 0 ? result : null;
  } catch (e) { return null; }
}

// Extract TXXX (User-defined text) — return {desc, value}
function extractTXXX(view, start, end) {
  try {
    const encoding = view[start];
    let pos = start + 1;
    const descStart = pos;
    if (encoding === 1 || encoding === 2) {
      while (pos < end - 1 && !(view[pos] === 0 && view[pos+1] === 0)) pos += 2;
      const descBytes = view.subarray(descStart, pos);
      pos += 2;
      const valBytes = view.subarray(pos, end);
      const dec = new TextDecoder('utf-16');
      return {
        desc: dec.decode(descBytes).replace(/\0+$/, '').trim(),
        value: dec.decode(valBytes).replace(/\0+$/, '').trim(),
      };
    } else {
      while (pos < end && view[pos] !== 0) pos++;
      const descBytes = view.subarray(descStart, pos);
      pos += 1;
      const valBytes = view.subarray(pos, end);
      const dec = encoding === 0 ? new TextDecoder('iso-8859-1') : new TextDecoder('utf-8');
      return {
        desc: dec.decode(descBytes).replace(/\0+$/, '').trim(),
        value: dec.decode(valBytes).replace(/\0+$/, '').trim(),
      };
    }
  } catch (e) { return null; }
}

function decodeID3Text(view, start, end) {
  const encoding = view[start];
  const data = view.subarray(start + 1, end);
  try {
    if (encoding === 0) return new TextDecoder('iso-8859-1').decode(data).replace(/\0+$/, '').trim();
    if (encoding === 1 || encoding === 2) return new TextDecoder('utf-16').decode(data).replace(/\0+$/, '').trim();
    if (encoding === 3) return new TextDecoder('utf-8').decode(data).replace(/\0+$/, '').trim();
    return new TextDecoder('utf-8').decode(data).replace(/\0+$/, '').trim();
  } catch {
    return '';
  }
}

function extractAPIC(view, start, end) {
  try {
    let pos = start + 1; // skip encoding
    // mime type (null-terminated)
    while (view[pos] !== 0 && pos < end) pos++;
    const mime = new TextDecoder().decode(view.subarray(start + 1, pos));
    pos++; // skip null
    pos++; // skip picture type
    // description (null-terminated)
    while (view[pos] !== 0 && pos < end) pos++;
    pos++; // skip null
    const imageData = view.subarray(pos, end);
    return new Blob([imageData], { type: mime || 'image/jpeg' });
  } catch {
    return null;
  }
}

// ---------- App State (Zustand-lite) ----------
const state = {
  tracks: [],          // semua lagu di library
  playlists: [],       // list playlist
  currentTrack: null,
  isPlaying: false,
  currentTime: 0,
  duration: 0,
  shuffle: false,
  repeat: 'off',       // 'off' | 'all' | 'one'
  queue: [],           // urutan lagu yang akan diputar
  queueIndex: 0,
  queueContext: null,  // { type: 'playlist'|'album'|'artist'|'library', name }
  view: 'home',        // 'home'|'search'|'library'|'playlist'|'artist'|'album'
  viewParam: null,     // id playlist / nama artist / nama album
  fullPlayerOpen: false,
  queueSheetOpen: false,
  sleepTimerSheetOpen: false,
  settingsSheetOpen: false,
  lyricsPageOpen: false,
  sleepTimerEndsAt: null, // timestamp; null = mati
  sleepTimerEndOfTrack: false,
  contextMenuTrack: null,
  importDialogOpen: false,
  search: '',
  filter: 'all',       // 'all'|'liked'|'recent'
  recentlyPlayed: [],  // track IDs urut dari yang baru
};

const subscribers = new Set();

// ----- Scroll position restore -----
// Map view key (e.g. "home:", "album:Nama Album") → scrollTop.
// Sebelum view berganti, simpan posisi scroll yang sekarang. Setelah render,
// kalau view baru pernah dikunjungi, restore posisinya. Default ke 0 (atas).
const _scrollPositions = new Map();
function _viewKey(view, param) { return `${view || ''}:${param || ''}`; }
function _saveCurrentScroll() {
  const main = document.querySelector('[data-main-scroll]');
  if (main) _scrollPositions.set(_viewKey(state.view, state.viewParam), main.scrollTop);
}
function _restoreScroll() {
  const main = document.querySelector('[data-main-scroll]');
  if (!main) return;
  const saved = _scrollPositions.get(_viewKey(state.view, state.viewParam));
  main.scrollTop = saved || 0;
}

function setState(updater) {
  const next = typeof updater === 'function' ? updater(state) : updater;
  // Kalau view atau viewParam akan berubah, simpan scroll sekarang
  const viewChanging =
    (next.view !== undefined && next.view !== state.view) ||
    (next.viewParam !== undefined && next.viewParam !== state.viewParam);
  if (viewChanging) _saveCurrentScroll();

  Object.assign(state, next);
  // Throttle: kalau banyak setState dalam 1 frame, gabungkan jadi 1 render aja
  if (setState._scheduled) return;
  setState._scheduled = true;
  requestAnimationFrame(() => {
    setState._scheduled = false;
    subscribers.forEach((cb) => cb(state));
    // Restore scroll setelah render selesai
    _restoreScroll();
  });
}
function subscribe(cb) { subscribers.add(cb); return () => subscribers.delete(cb); }

// ---------- Audio Engine ----------
const audio = new Audio();
audio.preload = 'metadata';
audio.crossOrigin = 'anonymous';
// Pakai inline mode di iOS Safari supaya bisa main di background
audio.setAttribute('playsinline', '');
audio.setAttribute('webkit-playsinline', '');
let currentObjectUrl = null;

// Secondary audio untuk crossfade (lagu berikutnya start sambil yang ini fade-out)
const audioB = new Audio();
audioB.preload = 'metadata';
audioB.crossOrigin = 'anonymous';
audioB.setAttribute('playsinline', '');
audioB.setAttribute('webkit-playsinline', '');
audioB.volume = 0;
let audioBObjectUrl = null;
// Flag: true kalau saat ini lagi proses crossfade
let _crossfadeActive = false;
let _crossfadeRAF = null;

// Crossfade settings — di-load dari STORE_META saat startup
let _crossfadeDuration = 0; // 0 = off, otherwise detik (2-12)
let _gaplessEnabled = false; // skip natural gap di akhir track (start next lebih cepet)
let _sleepFadeOut = true; // fade-out volume 30 detik terakhir sebelum sleep timer stop

async function loadAudioSettings() {
  try {
    const cf = await dbGet(STORE_META, 'crossfadeDuration');
    if (cf && typeof cf.value === 'number') _crossfadeDuration = cf.value;
    const gl = await dbGet(STORE_META, 'gaplessEnabled');
    if (gl) _gaplessEnabled = !!gl.value;
    const sf = await dbGet(STORE_META, 'sleepFadeOut');
    if (sf && sf.value !== undefined) _sleepFadeOut = !!sf.value;
  } catch (e) {}
}
function saveAudioSetting(key, value) {
  dbPut(STORE_META, { key, value }).catch(() => {});
}

// Time/duration updates pakai event-emitter terpisah supaya nggak trigger re-render UI.
// UI (mini player, full player) listen lewat onTimeUpdate dan patch DOM langsung.
const timeListeners = new Set();
function onTimeUpdate(cb) { timeListeners.add(cb); return () => timeListeners.delete(cb); }
function emitTime() { timeListeners.forEach(cb => { try { cb(audio.currentTime, audio.duration); } catch(e){} }); }

// State.currentTime dan state.duration tidak dipakai oleh render — tapi tetap kita simpan
// supaya kode lain yang reference state.currentTime tidak break. Update tanpa trigger render.
audio.addEventListener('timeupdate', () => {
  state.currentTime = audio.currentTime;
  emitTime();
});
audio.addEventListener('loadedmetadata', () => {
  state.duration = audio.duration;
  emitTime();
});
audio.addEventListener('durationchange', () => {
  state.duration = audio.duration;
  emitTime();
});
audio.addEventListener('ended', () => {
  // Sleep timer "Akhir lagu"
  if (state.sleepTimerEndOfTrack) {
    audio.pause();
    setState({ isPlaying: false, sleepTimerEndOfTrack: false, sleepTimerEndsAt: null });
    return;
  }
  if (state.repeat === 'one') {
    audio.currentTime = 0;
    audio.play();
  } else {
    // Kalau crossfade udah selesai (audioB udah jadi current), skip natural next
    // karena startCrossfade() udah handle transition-nya
    if (_crossfadeJustFinished) {
      _crossfadeJustFinished = false;
      return;
    }
    nextTrack();
  }
});
audio.addEventListener('play', () => { setState({ isPlaying: true }); });
audio.addEventListener('pause', () => { setState({ isPlaying: false }); });

// Monitor sisa waktu untuk trigger crossfade
audio.addEventListener('timeupdate', () => {
  maybeStartCrossfade();
});

let _crossfadeJustFinished = false;
let _crossfadeTriggered = false; // anti double-trigger per track

function maybeStartCrossfade() {
  if (_crossfadeActive || _crossfadeTriggered) return;
  if (!audio.duration || isNaN(audio.duration)) return;
  if (state.repeat === 'one') return;
  // Kalau ada sleep timer "akhir lagu", skip crossfade — biarkan ended normal
  if (state.sleepTimerEndOfTrack) return;

  // Tentukan window crossfade: pakai _crossfadeDuration kalau >0,
  // atau 0.5 detik kalau gapless enabled (mini-crossfade untuk hilangkan jeda alami)
  let cfWindow = _crossfadeDuration;
  if (cfWindow <= 0) {
    if (_gaplessEnabled) cfWindow = 0.5;
    else return;
  }

  const remaining = audio.duration - audio.currentTime;
  if (remaining > cfWindow) return;

  // Cari lagu berikutnya
  const next = getNextTrackForCrossfade();
  if (!next) return;

  _crossfadeTriggered = true;
  startCrossfade(next, cfWindow).catch(e => {
    console.warn('Crossfade failed:', e);
    _crossfadeTriggered = false;
    _crossfadeActive = false;
  });
}

function getNextTrackForCrossfade() {
  if (!state.queue || !state.queue.length) return null;
  let idx = state.queueIndex + 1;
  if (idx >= state.queue.length) {
    if (state.repeat === 'all') idx = 0;
    else return null;
  }
  return state.queue[idx];
}

async function startCrossfade(nextTrack, durationOverride) {
  _crossfadeActive = true;
  const duration = durationOverride != null ? durationOverride : _crossfadeDuration;

  // Setup audioB dengan next track
  if (audioBObjectUrl) URL.revokeObjectURL(audioBObjectUrl);
  audioBObjectUrl = URL.createObjectURL(nextTrack.blob);
  audioB.src = audioBObjectUrl;
  audioB.volume = 0;
  audioB.currentTime = 0;
  try {
    await audioB.play();
  } catch (e) {
    console.warn('AudioB play failed', e);
    _crossfadeActive = false;
    _crossfadeTriggered = false;
    return;
  }

  // Fade animation pakai requestAnimationFrame supaya smooth
  const startVolume = audio.volume;
  const fadeStart = performance.now();
  const fadeMs = duration * 1000;

  return new Promise((resolve) => {
    const tick = (now) => {
      if (!_crossfadeActive) { resolve(); return; }
      const t = Math.min(1, (now - fadeStart) / fadeMs);
      // Equal-power crossfade — lebih smooth daripada linear
      const fadeOutGain = Math.cos(t * Math.PI / 2);
      const fadeInGain = Math.sin(t * Math.PI / 2);
      try {
        audio.volume = Math.max(0, startVolume * fadeOutGain);
        audioB.volume = Math.min(1, fadeInGain);
      } catch (e) {}
      if (t >= 1) {
        finishCrossfade(nextTrack);
        resolve();
        return;
      }
      _crossfadeRAF = requestAnimationFrame(tick);
    };
    _crossfadeRAF = requestAnimationFrame(tick);
  });
}

function finishCrossfade(nextTrack) {
  // Crossfade selesai: pindah dari audioB ke audio (main).
  // Catat posisi sekarang di audioB, lalu copy blob URL ke audio main.
  const currentPositionInB = audioB.currentTime;

  // Flush session dari lagu lama, mulai session baru untuk lagu B
  flushListeningSession();

  // Tandai supaya 'ended' event dari audio (main) yang akan trigger berikutnya, jangan call nextTrack lagi
  _crossfadeJustFinished = true;

  // Update state ke next track
  const oldQueueIndex = state.queueIndex;
  let newIdx = oldQueueIndex + 1;
  if (newIdx >= state.queue.length) newIdx = 0;
  setState({ currentTrack: nextTrack, queueIndex: newIdx });

  // Stop audioB, pindahkan ke audio (main)
  audioB.pause();
  if (currentObjectUrl) URL.revokeObjectURL(currentObjectUrl);
  currentObjectUrl = audioBObjectUrl;
  audioBObjectUrl = null;

  audio.src = currentObjectUrl;
  audio.volume = 1;
  // Resume dari posisi yang sama supaya seamless
  const resumeAt = currentPositionInB;
  const onLoaded = () => {
    audio.removeEventListener('loadedmetadata', onLoaded);
    try { audio.currentTime = resumeAt; } catch (e) {}
    audio.play().catch(e => console.warn('Resume play failed', e));
  };
  audio.addEventListener('loadedmetadata', onLoaded);
  audio.load();

  // Update Media Session
  updateMediaSession(nextTrack);

  // Recently played
  const rp = [nextTrack.id, ...state.recentlyPlayed.filter(id => id !== nextTrack.id)].slice(0, 50);
  setState({ recentlyPlayed: rp });
  dbPut(STORE_META, { key: 'recentlyPlayed', value: rp }).catch(() => {});

  // Start session baru
  startListeningSession(nextTrack.id);

  // Reset flags
  _crossfadeActive = false;
  _crossfadeTriggered = false;
  if (_crossfadeRAF) {
    cancelAnimationFrame(_crossfadeRAF);
    _crossfadeRAF = null;
  }
}

function cancelCrossfade() {
  // Dipanggil kalau user manually skip/prev di tengah crossfade
  _crossfadeActive = false;
  _crossfadeTriggered = false;
  if (_crossfadeRAF) {
    cancelAnimationFrame(_crossfadeRAF);
    _crossfadeRAF = null;
  }
  try { audioB.pause(); } catch (e) {}
  if (audioBObjectUrl) {
    URL.revokeObjectURL(audioBObjectUrl);
    audioBObjectUrl = null;
  }
  audio.volume = 1;
  audioB.volume = 0;
}

// PENTING: Jangan stop audio saat tab hidden / page hide.
window.addEventListener('pagehide', () => { /* biarkan audio jalan */ });
window.addEventListener('blur', () => { /* biarkan audio jalan */ });

async function loadAndPlay(track) {
  if (!track) return;
  // Cancel crossfade kalau lagi aktif (user manual skip)
  if (_crossfadeActive) cancelCrossfade();
  _crossfadeTriggered = false;

  // FLUSH session sebelumnya kalau ada — lagu sebelumnya udah selesai didengar
  flushListeningSession();

  if (currentObjectUrl) URL.revokeObjectURL(currentObjectUrl);
  currentObjectUrl = URL.createObjectURL(track.blob);
  audio.src = currentObjectUrl;
  audio.volume = 1; // reset volume kalau bekas crossfade
  setState({ currentTrack: track });
  try { await audio.play(); } catch (e) { console.warn(e); }

  // Update Media Session
  updateMediaSession(track);

  // Recently played
  const rp = [track.id, ...state.recentlyPlayed.filter(id => id !== track.id)].slice(0, 50);
  setState({ recentlyPlayed: rp });
  await dbPut(STORE_META, { key: 'recentlyPlayed', value: rp });

  // Start session tracker untuk lagu baru ini
  startListeningSession(track.id);

  // Increment play count + update lastPlayedAt (untuk Top Tracks & Smart Playlist)
  // Pakai timer 5 detik supaya nggak hitung kalau user skip cepet.
  if (loadAndPlay._countTimer) clearTimeout(loadAndPlay._countTimer);
  loadAndPlay._countTimer = setTimeout(async () => {
    const t = state.tracks.find(x => x.id === track.id);
    if (!t || state.currentTrack?.id !== track.id) return;
    t.playCount = (t.playCount || 0) + 1;
    t.lastPlayedAt = Date.now();
    try { await dbPut(STORE_TRACKS, t); } catch (e) {}
    setState({ tracks: [...state.tracks] });
  }, 5000);
}

// =====================================================================
// Listening Session Tracker (untuk Stats Dashboard / Sonara Wrapped)
// =====================================================================
// Logika:
// - Tiap lagu yang diputar bikin 1 "session"
// - Saat audio playing, increment durationListened tiap detik
// - Saat lagu ganti, di-pause, atau di-flush, save session ke STORE_HISTORY
//   (asal durationListened >= 5 detik, supaya nggak nge-spam history dengan skip cepet)
// _currentSession: { id?, trackId, startedAt, lastTickAt, durationListened, lastSavedDuration }
let _currentSession = null;
let _sessionTickInterval = null;
let _historyChangedCallbacks = [];

function onHistoryChanged(cb) {
  _historyChangedCallbacks.push(cb);
  return () => {
    _historyChangedCallbacks = _historyChangedCallbacks.filter(x => x !== cb);
  };
}
function notifyHistoryChanged() {
  invalidateHistoryCache();
  _historyChangedCallbacks.forEach(cb => { try { cb(); } catch(e){} });
}

function startListeningSession(trackId) {
  _currentSession = {
    id: null,
    trackId,
    startedAt: Date.now(),
    lastTickAt: Date.now(),
    durationListened: 0,
    lastSavedDuration: 0,
  };
  if (_sessionTickInterval) clearInterval(_sessionTickInterval);
  _sessionTickInterval = setInterval(tickListeningSession, 1000);
}

function tickListeningSession() {
  if (!_currentSession) return;
  if (audio.paused) return;
  const now = Date.now();
  const delta = (now - _currentSession.lastTickAt) / 1000;
  if (delta <= 2) _currentSession.durationListened += delta;
  _currentSession.lastTickAt = now;

  // Periodic save tiap 10 detik supaya stats muncul cepat tanpa harus ganti lagu
  const gained = _currentSession.durationListened - _currentSession.lastSavedDuration;
  if (_currentSession.durationListened >= 5 && gained >= 10) {
    persistSessionSnapshot();
  }
}

async function persistSessionSnapshot() {
  if (!_currentSession) return;
  const s = _currentSession;
  if (s.durationListened < 5) return;
  try {
    const record = {
      trackId: s.trackId,
      playedAt: s.startedAt,
      durationListened: Math.round(s.durationListened),
    };
    if (s.id) record.id = s.id;
    const savedId = await dbPut(STORE_HISTORY, record);
    if (!s.id && savedId) s.id = savedId;
    s.lastSavedDuration = s.durationListened;
    notifyHistoryChanged();
  } catch (e) { console.warn('Failed to save session snapshot', e); }
}

async function flushListeningSession() {
  if (_sessionTickInterval) {
    clearInterval(_sessionTickInterval);
    _sessionTickInterval = null;
  }
  if (!_currentSession) return;
  const s = _currentSession;
  _currentSession = null;
  if (s.durationListened < 5) return;
  try {
    const record = {
      trackId: s.trackId,
      playedAt: s.startedAt,
      durationListened: Math.round(s.durationListened),
    };
    if (s.id) record.id = s.id;
    await dbPut(STORE_HISTORY, record);
    notifyHistoryChanged();
  } catch (e) { console.warn('Failed to save session', e); }
}

// Flush saat tab pindah ke background atau closed (best-effort)
document.addEventListener('visibilitychange', () => {
  // Saat tab kembali visible, kalau audio masih playing, lanjutkan session yang ada
  // Saat tab hidden, audio biasanya tetap jalan (di Android Chrome dengan background allow),
  // jadi tidak perlu flush — biarkan tick interval lanjut
});
window.addEventListener('pagehide', () => {
  // Best-effort flush — kalau page benar-benar di-close
  flushListeningSession();
});
// Flush juga saat audio pause/ended (lagu selesai)
audio.addEventListener('pause', () => {
  // Kalau pause >5 detik, anggap session berhenti — flush. Tapi jangan langsung flush
  // karena user mungkin cuma pause sebentar. Pakai timeout.
  if (audio.ended) return; // ended handled di event terpisah
  setTimeout(() => {
    if (audio.paused && !audio.ended && _currentSession) {
      flushListeningSession();
      // Re-prep session kalau user resume nanti — tapi nggak start interval sampai play lagi
    }
  }, 10000); // 10 detik
});
audio.addEventListener('play', () => {
  // Resume session: kalau tidak ada session, start one
  if (!_currentSession && state.currentTrack) {
    startListeningSession(state.currentTrack.id);
  } else if (_currentSession) {
    _currentSession.lastTickAt = Date.now();
    if (!_sessionTickInterval) {
      _sessionTickInterval = setInterval(tickListeningSession, 1000);
    }
  }
});

function updateMediaSession(track) {
  if (!('mediaSession' in navigator)) return;
  const artwork = track.cover ? [{ src: URL.createObjectURL(track.cover), sizes: '512x512', type: 'image/jpeg' }] : [];
  navigator.mediaSession.metadata = new MediaMetadata({
    title: track.title,
    artist: track.artist,
    album: track.album,
    artwork,
  });
  navigator.mediaSession.setActionHandler('play', () => { audio.play(); });
  navigator.mediaSession.setActionHandler('pause', () => { audio.pause(); });
  navigator.mediaSession.setActionHandler('previoustrack', prevTrack);
  navigator.mediaSession.setActionHandler('nexttrack', nextTrack);
  navigator.mediaSession.setActionHandler('seekto', (d) => { if (d.seekTime != null) audio.currentTime = d.seekTime; });
  try { navigator.mediaSession.setActionHandler('stop', () => { audio.pause(); }); } catch(e){}
  // Set playback state explicitly — bantu Android ngenali audio aktif
  navigator.mediaSession.playbackState = audio.paused ? 'paused' : 'playing';
}

// 1) Setting audio element supaya browser ngenali sebagai "media playback"

  if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'playing';

});

// 3) Visibility change handler — JANGAN pause saat tab hidden / app minimize

  }

// 5) Wake lock — minta browser jangan matiin layar/proses saat audio play
let wakeLock = null;
async function acquireWakeLock() {
  if (!('wakeLock' in navigator)) return;
  try {
    wakeLock = await navigator.wakeLock.request('screen');
    wakeLock.addEventListener('release', () => { wakeLock = null; });
  } catch (e) { /* ignored */ }
}
audio.addEventListener('play', () => {
  // Wake lock cuma effective saat tab visible — tapi tidak masalah
  if (document.visibilityState === 'visible') acquireWakeLock();
});
audio.addEventListener('pause', () => {
  if (wakeLock) { wakeLock.release().catch(() => {}); wakeLock = null; }
});
document.addEventListener('visibilitychange', () => {
  // Re-acquire wake lock saat balik ke foreground
  if (document.visibilityState === 'visible' && !audio.paused) acquireWakeLock();
});

// 6) Periodic position update untuk lock screen seek bar
setInterval(() => {
  if (!audio.paused && 'mediaSession' in navigator && 'setPositionState' in navigator.mediaSession) {
    try {
      navigator.mediaSession.setPositionState({
        duration: audio.duration || 0,
        playbackRate: audio.playbackRate,
        position: audio.currentTime,
      });
    } catch (e) {}
  }
}, 1000);

function playFromList(tracks, index, context) {
  const queue = state.shuffle ? shuffleArray(tracks, index) : tracks.slice();
  const newIndex = state.shuffle ? 0 : index;
  setState({ queue, queueIndex: newIndex, queueContext: context });
  loadAndPlay(queue[newIndex]);
}

function shuffleArray(arr, fixedIndex = 0) {
  const result = arr.slice();
  const fixedTrack = result[fixedIndex];
  const rest = result.filter((_, i) => i !== fixedIndex);
  for (let i = rest.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [rest[i], rest[j]] = [rest[j], rest[i]];
  }
  return [fixedTrack, ...rest];
}

function togglePlay() {
  if (audio.paused) audio.play(); else audio.pause();
}

function nextTrack() {
  let idx = state.queueIndex + 1;
  if (idx >= state.queue.length) {
    if (state.repeat === 'all') idx = 0;
    else { audio.pause(); return; }
  }
  setState({ queueIndex: idx });
  loadAndPlay(state.queue[idx]);
}

function prevTrack() {
  if (audio.currentTime > 3) { audio.currentTime = 0; return; }
  let idx = state.queueIndex - 1;
  if (idx < 0) idx = 0;
  setState({ queueIndex: idx });
  loadAndPlay(state.queue[idx]);
}

function toggleShuffle() {
  const newShuffle = !state.shuffle;
  if (newShuffle && state.currentTrack) {
    const queue = shuffleArray(state.queue, state.queueIndex);
    setState({ shuffle: true, queue, queueIndex: 0 });
  } else {
    setState({ shuffle: false });
  }
}

function cycleRepeat() {
  const order = ['off', 'all', 'one'];
  const next = order[(order.indexOf(state.repeat) + 1) % order.length];
  setState({ repeat: next });
}

// ---------- Sleep timer ----------
let sleepTimerInterval = null;
let _sleepFadeStarted = false;
function setSleepTimer(minutes) {
  clearSleepTimer();
  if (minutes === 'end_of_track') {
    setState({ sleepTimerEndOfTrack: true, sleepTimerEndsAt: null });
    return;
  }
  const endsAt = Date.now() + minutes * 60_000;
  setState({ sleepTimerEndsAt: endsAt, sleepTimerEndOfTrack: false });
  _sleepFadeStarted = false;
  sleepTimerInterval = setInterval(() => {
    const remaining = state.sleepTimerEndsAt - Date.now();
    if (remaining <= 0) {
      audio.pause();
      clearSleepTimer();
      // Restore volume untuk session berikutnya
      audio.volume = 1;
      _sleepFadeStarted = false;
      setState({ sleepTimerEndsAt: null });
    } else {
      // Sleep fade-out: 30 detik terakhir, fade volume linear ke 0
      if (_sleepFadeOut && remaining <= 30000 && !_crossfadeActive) {
        if (!_sleepFadeStarted) _sleepFadeStarted = true;
        const t = remaining / 30000; // 1 → 0
        try { audio.volume = Math.max(0.05, t); } catch (e) {}
      }
      // tick supaya UI update
      subscribers.forEach((cb) => cb(state));
    }
  }, 1000);
}
function clearSleepTimer() {
  if (sleepTimerInterval) { clearInterval(sleepTimerInterval); sleepTimerInterval = null; }
  if (_sleepFadeStarted) {
    audio.volume = 1;
    _sleepFadeStarted = false;
  }
  setState({ sleepTimerEndsAt: null, sleepTimerEndOfTrack: false });
}

// ---------- Helpers ----------
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }
function fmt(s) {
  if (!s || isNaN(s)) return '0:00';
  const m = Math.floor(s / 60), sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2, '0')}`;
}

// Get cover URL (cached). Pakai map supaya nggak leak object URLs.
const coverUrlCache = new Map();
function coverUrl(track) {
  if (!track || !track.cover) return null;
  if (coverUrlCache.has(track.id)) return coverUrlCache.get(track.id);
  const url = URL.createObjectURL(track.cover);
  coverUrlCache.set(track.id, url);
  return url;
}

// =====================================================================
// Dominant Color Extraction (untuk Color Theme Adaptif di Full Player)
// =====================================================================
// Extract warna dominan + warna sekunder dari image, balik 2 warna untuk gradient.
// Cache hasil per track ID supaya nggak compute ulang tiap buka full player.
const colorCache = new Map();

async function extractDominantColors(track) {
  if (!track || !track.cover) return null;
  if (colorCache.has(track.id)) return colorCache.get(track.id);

  const url = coverUrl(track);
  if (!url) return null;

  return new Promise((resolve) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      try {
        // Down-sample ke 50x50 supaya cepat
        const size = 50;
        const canvas = document.createElement('canvas');
        canvas.width = size; canvas.height = size;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, size, size);
        const data = ctx.getImageData(0, 0, size, size).data;

        // Bucket warna ke kotak 32×32×32 (5-bit per channel) supaya warna mirip di-merge
        const buckets = new Map();
        for (let i = 0; i < data.length; i += 4) {
          const r = data[i], g = data[i + 1], b = data[i + 2], a = data[i + 3];
          if (a < 200) continue; // skip transparent
          // Skip warna terlalu gelap atau terlalu terang
          const max = Math.max(r, g, b), min = Math.min(r, g, b);
          if (max < 30) continue; // hampir hitam
          if (min > 235) continue; // hampir putih
          // Skip warna terlalu ungu/grayscale (saturasi rendah)
          const sat = max - min;
          if (sat < 20 && max < 180) continue;
          // Bucket key
          const key = ((r >> 3) << 10) | ((g >> 3) << 5) | (b >> 3);
          buckets.set(key, (buckets.get(key) || 0) + 1 + sat); // weight by saturation
        }

        // Sort buckets by weight desc
        const sorted = [...buckets.entries()].sort((a, b) => b[1] - a[1]);
        if (sorted.length === 0) {
          colorCache.set(track.id, null);
          resolve(null);
          return;
        }

        // Decode top 2 (atau fallback ke 1) — yang berbeda cukup banyak dari yang pertama
        const decode = (key) => {
          const r = ((key >> 10) & 0x1f) << 3;
          const g = ((key >> 5) & 0x1f) << 3;
          const b = (key & 0x1f) << 3;
          return [r, g, b];
        };
        const dist = (a, b) => Math.abs(a[0]-b[0]) + Math.abs(a[1]-b[1]) + Math.abs(a[2]-b[2]);

        const primary = decode(sorted[0][0]);
        let secondary = primary;
        for (let i = 1; i < Math.min(sorted.length, 20); i++) {
          const c = decode(sorted[i][0]);
          if (dist(c, primary) > 80) { secondary = c; break; }
        }

        // Darkenize sedikit supaya text putih tetap terbaca
        const darken = (c, factor = 0.7) => c.map(x => Math.round(x * factor));
        const result = {
          primary: darken(primary, 0.85),
          secondary: darken(secondary, 0.55),
        };
        colorCache.set(track.id, result);
        resolve(result);
      } catch (e) {
        colorCache.set(track.id, null);
        resolve(null);
      }
    };
    img.onerror = () => {
      colorCache.set(track.id, null);
      resolve(null);
    };
    img.src = url;
  });
}

function rgbStr(c) { return `rgb(${c[0]}, ${c[1]}, ${c[2]})`; }

// Untuk artist/album: kita pakai cover lagu pertama (atau override)

// ---------- Library actions ----------
async function importFiles(fileList) {
  const allFiles = Array.from(fileList);
  const audioFiles = allFiles.filter(f => f.type.startsWith('audio/') || /\.(mp3|m4a|flac|wav|ogg|aac)$/i.test(f.name));
  const lyricFiles = allFiles.filter(f => /\.(lrc|txt)$/i.test(f.name));

  // Counters untuk feedback ke user
  let importedCount = 0;
  const skippedDupes = [];

  // Map basename → lyric file (untuk auto-pair)
  const lyricMap = {};
  for (const lf of lyricFiles) {
    const base = lf.name.replace(/\.(lrc|txt)$/i, '').toLowerCase();
    lyricMap[base] = lf;
  }

  for (const file of audioFiles) {
    const meta = await extractMetadata(file);
    const audioBase = file.name.replace(/\.(mp3|m4a|flac|wav|ogg|aac)$/i, '').toLowerCase();
    let lyrics = null, lyricsSynced = null;
    // Auto-pair lirik dari file sidecar (.lrc/.txt) — prioritas pertama
    if (lyricMap[audioBase]) {
      const lyricText = await lyricMap[audioBase].text();
      const isLrc = /\.lrc$/i.test(lyricMap[audioBase].name);
      if (isLrc) {
        lyricsSynced = parseLrc(lyricText);
        lyrics = lyricText;
      } else {
        lyrics = lyricText;
      }
    }
    // Fallback: pakai lirik embedded di MP3 (USLT atau TXXX) kalau gak ada sidecar
    if (!lyrics && meta.lyrics) {
      lyrics = meta.lyrics;
      // Kalau USLT-nya ternyata format LRC, parse sebagai synced
      if (!lyricsSynced && /\[\d{1,2}:\d{2}/.test(meta.lyrics)) {
        lyricsSynced = parseLrc(meta.lyrics);
      }
    }
    if (!lyricsSynced && meta.lyricsSynced) {
      lyricsSynced = meta.lyricsSynced;
    }
    const track = {
      id: uid(),
      title: meta.title,
      artist: meta.artist,
      album: meta.album,
      duration: meta.duration,
      blob: file,
      cover: meta.cover,
      liked: false,
      addedAt: Date.now(),
      playCount: 0,
      lastPlayedAt: null,
      lyrics,
      lyricsSynced,
    };
    // Anti-duplikat: hitung audio hash, cek apakah sudah ada di koleksi
    try {
      const hash = await computeAudioHash(file);
      if (hash) {
        track.audioHash = hash;
        // Check existing tracks
        const dupe = state.tracks.find(t => t.audioHash === hash);
        if (dupe) {
          skippedDupes.push({ file: file.name, existing: dupe });
          continue; // skip import
        }
      }
    } catch (e) { /* abaikan, tetap import */ }

    await dbPut(STORE_TRACKS, track);
    setState((s) => ({ tracks: [...s.tracks, track] }));
    importedCount++;
  }

  // Tampilkan ringkasan kalau ada yang di-skip
  if (skippedDupes.length > 0) {
    const msg = importedCount > 0
      ? `✓ ${importedCount} lagu diimport · ${skippedDupes.length} duplikat dilewati`
      : `${skippedDupes.length} file sudah ada di koleksi, tidak ada yang baru diimport`;
    showToast(msg, 3500, importedCount > 0 ? 'success' : 'default');
  } else if (importedCount > 0) {
    showToast(`✓ ${importedCount} lagu diimport`, 2000, 'success');
  }
}

// ----- LRC parser (synced lyrics) -----
// Format: [mm:ss.xx]Lyric text  → { time: seconds, text: 'Lyric text' }
function parseLrc(text) {
  const lines = text.split(/\r?\n/);
  const result = [];
  const re = /\[(\d{1,2}):(\d{2})(?:\.(\d{1,3}))?\]/g;
  for (const line of lines) {
    const matches = [...line.matchAll(re)];
    if (matches.length === 0) continue;
    const lyricText = line.replace(re, '').trim();
    if (!lyricText) continue;
    for (const m of matches) {
      const min = parseInt(m[1], 10);
      const sec = parseInt(m[2], 10);
      const ms = m[3] ? parseInt(m[3].padEnd(3, '0'), 10) : 0;
      const time = min * 60 + sec + ms / 1000;
      result.push({ time, text: lyricText });
    }
  }
  result.sort((a, b) => a.time - b.time);
  return result.length > 0 ? result : null;
}

// ----- Set / clear lyrics on a track manually -----
async function setTrackLyrics(trackId, text) {
  const t = state.tracks.find(x => x.id === trackId);
  if (!t) return;
  if (!text || !text.trim()) {
    t.lyrics = null;
    t.lyricsSynced = null;
  } else {
    const synced = parseLrc(text);
    t.lyrics = text;
    t.lyricsSynced = synced;
  }
  await dbPut(STORE_TRACKS, t);
  setState({ tracks: [...state.tracks] });
  // Update currentTrack reference juga kalau lagi diputar
  if (state.currentTrack?.id === trackId) setState({ currentTrack: t });
}

// ----- LRCLIB auto-fetch (free, no API key) -----
// API: https://lrclib.net/docs
// Saat user request fetch, kita coba 3 strategi:
// 1. Exact match by track_name + artist_name + (album_name + duration)
// 2. Search by track_name + artist_name (loose)
// 3. Search by track_name only (last resort)
async function fetchLyricsFromLrclib(track, opts = {}) {
  if (!track) return { ok: false, error: 'Track kosong' };
  if (!navigator.onLine) return { ok: false, error: 'Tidak ada koneksi internet' };

  const enc = encodeURIComponent;
  const tries = [
    // Get exact: paling akurat, butuh duration
    {
      url: `https://lrclib.net/api/get?track_name=${enc(track.title)}&artist_name=${enc(track.artist)}&album_name=${enc(track.album || '')}&duration=${Math.round(track.duration || 0)}`,
      isList: false,
    },
    // Search by track + artist
    {
      url: `https://lrclib.net/api/search?track_name=${enc(track.title)}&artist_name=${enc(track.artist)}`,
      isList: true,
    },
    // Search by track only
    {
      url: `https://lrclib.net/api/search?track_name=${enc(track.title)}`,
      isList: true,
    },
  ];

  for (const t of tries) {
    try {
      const res = await fetch(t.url, { headers: { 'User-Agent': 'Sonara/1.0 (personal music player)' } });
      if (!res.ok) continue;
      const data = await res.json();
      let candidate = null;
      if (t.isList) {
        if (Array.isArray(data) && data.length > 0) candidate = data[0];
      } else {
        if (data && (data.syncedLyrics || data.plainLyrics)) candidate = data;
      }
      if (!candidate) continue;
      // Prefer synced
      const synced = candidate.syncedLyrics;
      const plain = candidate.plainLyrics;
      if (synced) {
        return { ok: true, text: synced, isSynced: true, source: 'LRCLIB' };
      }
      if (plain) {
        return { ok: true, text: plain, isSynced: false, source: 'LRCLIB' };
      }
    } catch (e) {
      // Continue ke try berikutnya
    }
  }
  return { ok: false, error: 'Lirik tidak ditemukan di LRCLIB' };
}

async function autoFetchAndApplyLyrics(track) {
  const result = await fetchLyricsFromLrclib(track);
  if (!result.ok) return result;
  await setTrackLyrics(track.id, result.text);
  return result;
}

// =====================================================================
// Auto-fetch Cover Art (MusicBrainz + Cover Art Archive)
// =====================================================================
// Search MusicBrainz untuk recording → ambil release ID → download cover dari CAA.
// Free, no API key required. Rate limit 1 req/sec untuk MB API (kita kasih jeda 1.1s).
async function fetchCoverArtFromMB(track) {
  if (!track || !track.title) return { ok: false, error: 'Track tidak valid' };
  try {
    const enc = encodeURIComponent;
    // 1. Search di MusicBrainz untuk recording
    const query = `recording:"${track.title}" AND artist:"${track.artist || ''}"`;
    const searchUrl = `https://musicbrainz.org/ws/2/recording/?query=${enc(query)}&fmt=json&limit=5`;
    const sr = await fetch(searchUrl, { headers: { 'User-Agent': 'Sonara/1.0 (personal music app)' } });
    if (!sr.ok) return { ok: false, error: `Search gagal (${sr.status})` };
    const sj = await sr.json();
    const recordings = sj.recordings || [];
    if (recordings.length === 0) return { ok: false, error: 'Tidak ada hasil' };

    // 2. Dari hasil, cari release pertama yang punya release ID
    let releaseId = null;
    for (const rec of recordings) {
      const rels = rec.releases || [];
      if (rels.length > 0 && rels[0].id) { releaseId = rels[0].id; break; }
    }
    if (!releaseId) return { ok: false, error: 'Tidak ada release info' };

    // 3. Coba ambil cover dari CAA (Cover Art Archive)
    const caaUrl = `https://coverartarchive.org/release/${releaseId}/front-500`;
    const cr = await fetch(caaUrl);
    if (!cr.ok) return { ok: false, error: 'Cover tidak tersedia' };
    const blob = await cr.blob();
    if (blob.size < 1000) return { ok: false, error: 'Cover terlalu kecil' };
    return { ok: true, blob };
  } catch (e) {
    return { ok: false, error: e.message };
  }
}

// Bulk auto-fetch covers untuk lagu yang belum punya cover
async function bulkFetchCovers() {
  const noCover = state.tracks.filter(t => !t.cover);
  if (noCover.length === 0) {
    showToast('Semua lagu sudah punya cover art', 2000);
    return;
  }
  if (!confirm(`Cari cover art untuk ${noCover.length} lagu? Bisa makan waktu beberapa menit (1.1 detik per lagu untuk hormati MusicBrainz rate limit).`)) return;

  let found = 0, failed = 0;
  for (let i = 0; i < noCover.length; i++) {
    const track = noCover[i];
    showToast(`Memproses ${i+1}/${noCover.length}: ${track.title}`, 1500);
    const result = await fetchCoverArtFromMB(track);
    if (result.ok) {
      track.cover = result.blob;
      await dbPut(STORE_TRACKS, track);
      coverUrlCache.delete(track.id);
      colorCache.delete(track.id);
      found++;
    } else {
      failed++;
    }
    setState({ tracks: [...state.tracks] });
    // Rate limit: 1.1s per request
    if (i < noCover.length - 1) await new Promise(r => setTimeout(r, 1100));
  }
  showToast(`Selesai: ${found} cover ditemukan, ${failed} gagal`, 4000, found > 0 ? 'success' : 'error');
}

// =====================================================================
// Duplicate Track Detector
// =====================================================================
// 2-tier matching:
// 1. Audio hash sama → identik 100% → auto-grup "Pasti duplikat"
// 2. Judul + artis sama (normalized) → mirip → grup "Kemungkinan duplikat"
//    (user yang putuskan — bisa beda versi live/studio/remix)

// Hash audio: SHA-256 dari sampel byte (cepat & cukup unik tanpa baca full file)
async function computeAudioHash(blob) {
  try {
    // Baca 3 chunk: awal, tengah, akhir → 96 KB total
    // Ini cukup unik untuk deteksi file identik, dan jauh lebih cepat daripada hash full file
    const size = blob.size;
    const chunkSize = 32 * 1024;
    const chunks = [];
    chunks.push(await blob.slice(0, chunkSize).arrayBuffer());
    if (size > chunkSize * 2) {
      const mid = Math.floor((size - chunkSize) / 2);
      chunks.push(await blob.slice(mid, mid + chunkSize).arrayBuffer());
    }
    if (size > chunkSize * 3) {
      chunks.push(await blob.slice(size - chunkSize, size).arrayBuffer());
    }
    // Concat + size suffix supaya file beda ukuran (truncated) tetap beda hash
    const totalLen = chunks.reduce((a, b) => a + b.byteLength, 0) + 8;
    const combined = new Uint8Array(totalLen);
    let off = 0;
    for (const c of chunks) {
      combined.set(new Uint8Array(c), off);
      off += c.byteLength;
    }
    // Append size as 8 bytes
    new DataView(combined.buffer).setBigUint64(off, BigInt(size));
    const hashBuf = await crypto.subtle.digest('SHA-256', combined);
    return Array.from(new Uint8Array(hashBuf)).map(b => b.toString(16).padStart(2, '0')).join('');
  } catch (e) {
    console.warn('Hash failed:', e);
    return null;
  }
}

// Normalisasi judul/artis untuk matching fuzzy
// Hapus: "(Official Audio)", "(feat. X)", "[Lyrics]", "(Live)", spasi extra, tanda baca, lowercase
function normalizeTitle(s) {
  if (!s) return '';
  return s
    .toLowerCase()
    .replace(/\(official\s*(audio|video|music\s*video|mv|lyric.*?)\)/gi, '')
    .replace(/\[official\s*(audio|video|music\s*video|mv|lyric.*?)\]/gi, '')
    .replace(/\(lyric.*?\)/gi, '')
    .replace(/\[lyric.*?\]/gi, '')
    .replace(/\(audio\)/gi, '')
    .replace(/\(hq\)|\(hd\)/gi, '')
    .replace(/\(feat\.?\s+.*?\)/gi, '')
    .replace(/\(ft\.?\s+.*?\)/gi, '')
    .replace(/\sfeat\.?\s+.*$/gi, '')
    .replace(/\sft\.?\s+.*$/gi, '')
    .replace(/[\(\[\{].*?(remaster|remastered|version|edit|mix|cover|acoustic).*?[\)\]\}]/gi, '')
    .replace(/[^\w\s]/g, ' ')  // tanda baca → spasi
    .replace(/\s+/g, ' ')
    .trim();
}

function normalizeArtist(s) {
  if (!s) return '';
  return s
    .toLowerCase()
    .replace(/\sfeat\.?\s+.*$/gi, '')
    .replace(/\sft\.?\s+.*$/gi, '')
    .replace(/\s*[,&x]\s+.*$/gi, '') // ambil artis pertama aja: "Sal Priadi feat X" / "X & Y" / "X, Y"
    .replace(/[^\w\s]/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

// Scan semua track, return array of duplicate groups
// Setiap group: { type: 'identical' | 'similar', tracks: [...], reason: string }
async function findDuplicateGroups(progressCb) {
  const tracks = state.tracks;
  const total = tracks.length;

  // Step 1: compute / load audio hash untuk semua track yang belum punya
  for (let i = 0; i < tracks.length; i++) {
    const t = tracks[i];
    if (progressCb) progressCb({ phase: 'hash', current: i + 1, total });
    if (!t.audioHash && t.blob) {
      const h = await computeAudioHash(t.blob);
      if (h) {
        t.audioHash = h;
        try { await dbPut(STORE_TRACKS, t); } catch (e) {}
      }
    }
  }

  // Step 2: group by hash (identical)
  const byHash = {};
  for (const t of tracks) {
    if (!t.audioHash) continue;
    if (!byHash[t.audioHash]) byHash[t.audioHash] = [];
    byHash[t.audioHash].push(t);
  }
  const identicalGroups = Object.values(byHash)
    .filter(g => g.length >= 2)
    .map(g => ({
      type: 'identical',
      tracks: g.sort((a, b) => (a.addedAt || 0) - (b.addedAt || 0)),
      reason: 'File identik 100% (audio hash sama)',
    }));

  // IDs yang udah masuk identical group — skip dari similar matching
  const handledIds = new Set();
  for (const g of identicalGroups) g.tracks.forEach(t => handledIds.add(t.id));

  // Step 3: group by normalized title+artist (similar)
  const byMeta = {};
  for (const t of tracks) {
    if (handledIds.has(t.id)) continue;
    const nTitle = normalizeTitle(t.title);
    const nArtist = normalizeArtist(t.artist);
    if (!nTitle || !nArtist) continue;
    const key = `${nTitle}|||${nArtist}`;
    if (!byMeta[key]) byMeta[key] = [];
    byMeta[key].push(t);
  }
  const similarGroups = Object.values(byMeta)
    .filter(g => g.length >= 2)
    .map(g => ({
      type: 'similar',
      tracks: g.sort((a, b) => (a.addedAt || 0) - (b.addedAt || 0)),
      reason: 'Judul & artis sama (mungkin versi berbeda)',
    }));

  if (progressCb) progressCb({ phase: 'done', current: total, total });

  return { identical: identicalGroups, similar: similarGroups };
}

// Bulk delete dengan progress
async function deleteTracks(ids) {
  for (const id of ids) {
    try { await dbDelete(STORE_TRACKS, id); } catch (e) {}
  }
  setState((s) => ({ tracks: s.tracks.filter(t => !ids.includes(t.id)) }));
  // Cleanup dari playlist
  for (const pl of state.playlists) {
    const before = pl.trackIds.length;
    pl.trackIds = pl.trackIds.filter(tid => !ids.includes(tid));
    if (pl.trackIds.length !== before) {
      try { await dbPut(STORE_PLAYLISTS, pl); } catch (e) {}
    }
  }
  setState({ playlists: [...state.playlists] });
}

async function toggleLike(id) {
  const t = state.tracks.find(x => x.id === id);
  if (!t) return;
  t.liked = !t.liked;
  await dbPut(STORE_TRACKS, t);
  setState({ tracks: [...state.tracks] });
}

async function createPlaylist(name) {
  const pl = { id: uid(), name, trackIds: [], createdAt: Date.now() };
  await dbPut(STORE_PLAYLISTS, pl);
  setState((s) => ({ playlists: [...s.playlists, pl] }));
  return pl;
}

async function addToPlaylist(playlistId, trackId) {
  const pl = state.playlists.find(p => p.id === playlistId);
  if (!pl) return;
  if (!pl.trackIds.includes(trackId)) {
    pl.trackIds.push(trackId);
    await dbPut(STORE_PLAYLISTS, pl);
    setState({ playlists: [...state.playlists] });
  }
}

async function removeFromPlaylist(playlistId, trackId) {
  const pl = state.playlists.find(p => p.id === playlistId);
  if (!pl) return;
  pl.trackIds = pl.trackIds.filter(id => id !== trackId);
  await dbPut(STORE_PLAYLISTS, pl);
  setState({ playlists: [...state.playlists] });
}

async function deletePlaylist(id) {
  await dbDelete(STORE_PLAYLISTS, id);
  setState((s) => ({ playlists: s.playlists.filter(p => p.id !== id) }));
}

async function reorderPlaylist(playlistId, fromIndex, toIndex) {
  const pl = state.playlists.find(p => p.id === playlistId);
  if (!pl) return;
  const ids = pl.trackIds.slice();
  const [moved] = ids.splice(fromIndex, 1);
  ids.splice(toIndex, 0, moved);
  pl.trackIds = ids;
  await dbPut(STORE_PLAYLISTS, pl);
  setState({ playlists: [...state.playlists] });
}

async function reorderQueue(fromIndex, toIndex) {
  // fromIndex/toIndex relative to queue (excluding currently playing track)
  // Currently playing = state.queueIndex; reorderable = setelah index itu
  const q = state.queue.slice();
  const realFrom = state.queueIndex + 1 + fromIndex;
  const realTo = state.queueIndex + 1 + toIndex;
  const [moved] = q.splice(realFrom, 1);
  q.splice(realTo, 0, moved);
  setState({ queue: q });
}

async function addToQueue(trackId) {
  const t = state.tracks.find(x => x.id === trackId);
  if (!t) return;
  const q = state.queue.slice();
  q.splice(state.queueIndex + 1, 0, t);
  setState({ queue: q });
}

async function setOverrideImage(key, file) {
  await dbPut(STORE_OVERRIDES, { key, image: file });
  // Trigger re-render
  setState({});
}

async function clearOverrideImage(key) {
  await dbDelete(STORE_OVERRIDES, key);
  setState({});
}

// ---------- Initial Load ----------
async function init() {
  const [tracks, playlists, recent] = await Promise.all([
    dbGetAll(STORE_TRACKS),
    dbGetAll(STORE_PLAYLISTS),
    dbGet(STORE_META, 'recentlyPlayed'),
  ]);
  // Migrasi: tambahin field baru ke track lama yang belum punya
  const migrated = (tracks || []).map(t => {
    let needsSave = false;
    if (t.playCount === undefined) { t.playCount = 0; needsSave = true; }
    if (t.lastPlayedAt === undefined) { t.lastPlayedAt = null; needsSave = true; }
    if (t.lyrics === undefined) { t.lyrics = null; needsSave = true; }
    if (t.lyricsSynced === undefined) { t.lyricsSynced = null; needsSave = true; }
    if (needsSave) { try { dbPut(STORE_TRACKS, t); } catch(e){} }
    return t;
  });
  setState({
    tracks: migrated,
    playlists: playlists || [],
    recentlyPlayed: (recent && recent.value) || [],
  });
  // Load audio settings (crossfade, gapless, sleep fade)
  await loadAudioSettings();
}

  root.appendChild(renderApp());

function renderApp() {
  const wrap = el('div', 'h-full flex flex-col bg-spo-bg text-spo-text relative');

  // Main scroll area
  const main = el('div', 'flex-1 overflow-y-auto scroll-y safe-top');
  main.setAttribute('data-main-scroll', '');
  main.appendChild(renderView());
  wrap.appendChild(main);

  // Mini player (kalau ada lagu)
  if (state.currentTrack) {
    wrap.appendChild(renderMiniPlayer());
  }

  // Bottom nav
  wrap.appendChild(renderBottomNav());

  // Overlays
  if (state.fullPlayerOpen) wrap.appendChild(renderFullPlayer());
  else _wasFullPlayerOpen = false; // Reset flag supaya open berikutnya animasi lagi
  if (state.lyricsPageOpen && state.currentTrack) wrap.appendChild(renderLyricsPage());
  if (state.queueSheetOpen) wrap.appendChild(renderQueueSheet());
  if (state.sleepTimerSheetOpen) wrap.appendChild(renderSleepTimerSheet());
  if (state.settingsSheetOpen) wrap.appendChild(renderSettingsSheet());
  if (state.contextMenuTrack) wrap.appendChild(renderContextMenu());
  if (state.importDialogOpen) wrap.appendChild(renderImportDialog());

  return wrap;
}

function el(tag, cls, text) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (text != null) e.textContent = text;
  return e;
}

// ----- Sheet close with animation -----
// Pakai untuk semua sheet supaya ditutupnya smooth (slide-down + fade-out backdrop),
// bukan langsung hilang yang bikin "loncat".
//
// Cara pakai:
//   closeSheetWithAnim(overlayElement, sheetElement, () => setState({ queueSheetOpen: false }));
//
// Ini akan:
// 1. Animate sheet slide-down + backdrop fade-out
// 2. Setelah 240ms (animasi selesai), call callback (setState yang remove dari DOM)
let _closingSheets = new WeakSet();
function closeSheetWithAnim(overlay, sheet, doneCallback, isFullPlayer = false) {
  if (_closingSheets.has(overlay)) return; // Prevent double-trigger
  _closingSheets.add(overlay);

  // Animasi keluar — pastikan slide-up tidak konflik
  if (sheet) {
    // Force reflow setelah remove animate-slide-up supaya slide-down bisa fresh start
    sheet.classList.remove('animate-slide-up');
    // Trigger reflow
    void sheet.offsetWidth;
    sheet.classList.add(isFullPlayer ? 'closing-fullplayer' : 'closing-sheet');
  }
  // Backdrop fade-out (kalau ada)
  const backdrop = overlay.querySelector('.sheet-backdrop-bg');
  if (backdrop) backdrop.classList.add('closing-backdrop');
  // Disable pointer events biar nggak ada double-tap saat close
  overlay.style.pointerEvents = 'none';

  setTimeout(() => {
    if (typeof doneCallback === 'function') doneCallback();
  }, isFullPlayer ? 370 : 330);
}

// Cache history di memory supaya komputasi cepat. Refresh dari IndexedDB on demand.
let _historyCache = null;
let _historyCacheAt = 0;

async function getHistory(forceRefresh = false) {
  // Cache 30 detik supaya gak query IndexedDB tiap render
  if (!forceRefresh && _historyCache && (Date.now() - _historyCacheAt < 30000)) {
    return _historyCache;
  }
  try {
    const all = await dbGetAll(STORE_HISTORY);
    _historyCache = all || [];
    _historyCacheAt = Date.now();
  } catch (e) { _historyCache = []; }
  return _historyCache;
}

function invalidateHistoryCache() { _historyCache = null; }

// Helper: filter history dalam time window
function filterByPeriod(history, period) {
  const now = Date.now();
  let cutoff;
  switch (period) {
    case 'today': {
      // Mulai hari ini jam 00:00
      const d = new Date(); d.setHours(0, 0, 0, 0);
      cutoff = d.getTime();
      break;
    }
    case 'week': {
      // 7 hari ke belakang
      cutoff = now - 7 * 24 * 60 * 60 * 1000;
      break;
    }
    case 'month': {
      cutoff = now - 30 * 24 * 60 * 60 * 1000;
      break;
    }
    case 'year': {
      cutoff = now - 365 * 24 * 60 * 60 * 1000;
      break;
    }
    default: return history; // all-time
  }
  return history.filter(h => h.playedAt >= cutoff);
}

// Total durasi dengar dalam periode (detik)
function totalSecondsListened(history, period) {
  const filtered = filterByPeriod(history, period);
  return filtered.reduce((sum, h) => sum + (h.durationListened || 0), 0);
}

// Format detik ke "5j 23m" / "23m 45s" / "45s"
function formatDuration(seconds) {
  if (!seconds || seconds < 1) return '0m';
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = Math.floor(seconds % 60);
  if (h > 0) return `${h}j ${m}m`;
  if (m > 0) return `${m}m`;
  return `${s}s`;
}

// Top N tracks dalam periode, sorted by play count
function getTopTracksInPeriod(history, period, limit = 10) {
  const filtered = filterByPeriod(history, period);
  const counts = new Map();
  const durations = new Map();
  for (const h of filtered) {
    counts.set(h.trackId, (counts.get(h.trackId) || 0) + 1);
    durations.set(h.trackId, (durations.get(h.trackId) || 0) + (h.durationListened || 0));
  }
  return [...counts.entries()]
    .map(([trackId, count]) => ({
      track: state.tracks.find(t => t.id === trackId),
      playCount: count,
      totalDuration: durations.get(trackId) || 0,
    }))
    .filter(x => x.track) // Skip lagu yang udah di-delete
    .sort((a, b) => b.playCount - a.playCount)
    .slice(0, limit);
}

// Top artists dalam periode (by total play count of their tracks)
function getTopArtistsInPeriod(history, period, limit = 5) {
  const filtered = filterByPeriod(history, period);
  const counts = new Map();
  for (const h of filtered) {
    const t = state.tracks.find(x => x.id === h.trackId);
    if (!t) continue;
    const artist = t.artist || 'Unknown Artist';
    counts.set(artist, (counts.get(artist) || 0) + 1);
  }
  return [...counts.entries()]
    .sort((a, b) => b[1] - a[1])
    .slice(0, limit)
    .map(([name, count]) => ({ name, playCount: count }));
}

// Top albums dalam periode
function getTopAlbumsInPeriod(history, period, limit = 5) {
  const filtered = filterByPeriod(history, period);
  const counts = new Map();
  for (const h of filtered) {
    const t = state.tracks.find(x => x.id === h.trackId);
    if (!t) continue;
    const album = t.album || 'Unknown Album';
    counts.set(album, (counts.get(album) || 0) + 1);
  }
  return [...counts.entries()]
    .sort((a, b) => b[1] - a[1])
    .slice(0, limit)
    .map(([name, count]) => ({ name, playCount: count }));
}

// Streak: berapa hari berturut-turut user dengar musik (mundur dari hari ini)
function getStreak(history) {
  if (history.length === 0) return 0;
  // Set of YYYY-MM-DD strings yang ada listening activity
  const days = new Set();
  for (const h of history) {
    const d = new Date(h.playedAt);
    days.add(`${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`);
  }
  let streak = 0;
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  for (let i = 0; i < 365; i++) {
    const d = new Date(today.getTime() - i * 24 * 60 * 60 * 1000);
    const key = `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
    if (days.has(key)) streak++;
    else if (i === 0) continue; // hari ini boleh kosong, lanjut cek kemarin
    else break;
  }
  return streak;
}

// Histogram jam dengar per hari (last 30 hari) — untuk bar chart
function getDailyHistogram(history, days = 30) {
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const result = [];
  for (let i = days - 1; i >= 0; i--) {
    const d = new Date(today.getTime() - i * 24 * 60 * 60 * 1000);
    const start = d.getTime();
    const end = start + 24 * 60 * 60 * 1000;
    const secs = history
      .filter(h => h.playedAt >= start && h.playedAt < end)
      .reduce((s, h) => s + (h.durationListened || 0), 0);
    result.push({ date: d, seconds: secs });
  }
  return result;
}

// Hour-of-day pattern: di jam berapa user paling sering dengar
function getHourlyPattern(history) {
  const hours = new Array(24).fill(0);
  for (const h of history) {
    const d = new Date(h.playedAt);
    hours[d.getHours()] += h.durationListened || 0;
  }
  return hours;
}

// Day-of-week pattern (0=Minggu, 6=Sabtu)
function getDayOfWeekPattern(history) {
  const days = new Array(7).fill(0);
  for (const h of history) {
    const d = new Date(h.playedAt);
    days[d.getDay()] += h.durationListened || 0;
  }
  return days;
}

function getSmartPlaylists() {
  const result = [];
  const allTracks = state.tracks;
  if (allTracks.length === 0) return result;

  // 1. Disukai (kalau ada > 3)
  const liked = allTracks.filter(t => t.liked);
  if (liked.length >= 3) {
    result.push({
      id: 'smart-liked',
      name: 'Lagu Disukai',
      tracks: liked.sort((a, b) => (b.lastPlayedAt || b.addedAt) - (a.lastPlayedAt || a.addedAt)),
      gradient: 'linear-gradient(135deg, #c026d3 0%, #1e3a8a 100%)',
    });
  }

  // 2. Baru ditambahkan (last 30 days, max 30 lagu)
  const month = 30 * 24 * 60 * 60 * 1000;
  const recentlyAdded = allTracks
    .filter(t => (t.addedAt || 0) > Date.now() - month)
    .sort((a, b) => (b.addedAt || 0) - (a.addedAt || 0))
    .slice(0, 30);
  if (recentlyAdded.length >= 3) {
    result.push({
      id: 'smart-new',
      name: 'Baru ditambahkan',
      tracks: recentlyAdded,
      gradient: 'linear-gradient(135deg, #059669 0%, #047857 100%)',
    });
  }

  // 3. Belum pernah didengar (playCount = 0 dan bukan baru ditambahkan)
  const undiscovered = allTracks
    .filter(t => (t.playCount || 0) === 0 && (t.addedAt || 0) < Date.now() - month)
    .sort(() => Math.random() - 0.5)
    .slice(0, 30);
  if (undiscovered.length >= 5) {
    result.push({
      id: 'smart-discover',
      name: 'Discover Mix',
      tracks: undiscovered,
      gradient: 'linear-gradient(135deg, #7c3aed 0%, #db2777 100%)',
    });
  }

  // 4. Sering didengar (playCount >= 5)
  const often = allTracks
    .filter(t => (t.playCount || 0) >= 5)
    .sort((a, b) => (b.playCount || 0) - (a.playCount || 0))
    .slice(0, 50);
  if (often.length >= 3) {
    result.push({
      id: 'smart-often',
      name: 'Favorit Mix',
      tracks: often,
      gradient: 'linear-gradient(135deg, #dc2626 0%, #ea580c 100%)',
    });
  }

  // 5. Random shuffle (50 lagu acak) — selalu ada kalau library > 10
  if (allTracks.length >= 10) {
    const shuffled = [...allTracks].sort(() => Math.random() - 0.5).slice(0, 50);
    result.push({
      id: 'smart-random',
      name: 'Random Mix',
      tracks: shuffled,
      gradient: 'linear-gradient(135deg, #0891b2 0%, #0e7490 100%)',
    });
  }

  return result;
}

function getGreeting() {
  const h = new Date().getHours();
  if (h < 11) return 'Selamat pagi';
  if (h < 15) return 'Selamat siang';
  if (h < 19) return 'Selamat sore';
  return 'Selamat malam';
}

      rank.textContent = `${i+1}`;
